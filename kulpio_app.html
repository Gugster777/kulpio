// ─── IN-APP RECIPE DETAIL ────────────────────────────────────────
// Pulls a full ingredient list + step-by-step method from TheMealDB and
// shows it inside the app instead of bouncing the user to a web search.
function extractMeal(info) {
  const ingredients = [];
  for (let i = 1; i <= 20; i++) {
    const nm = info[`strIngredient${i}`];
    const ms = info[`strMeasure${i}`];
    if (nm && nm.trim()) ingredients.push({name: nm.trim(), measure: (ms || '').trim()});
  }
  return {
    image: info.strMealThumb || null,
    instructions: info.strInstructions || '',
    ingredients,
    external: info.strSource || info.strYoutube || null
  };
}

async function fetchRecipeByName(name) {
  try {
    const res = await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(name)}`);
    const data = await res.json();
    const meal = (data.meals || [])[0];
    return meal ? extractMeal(meal) : null;
  } catch { return null; }
}

// ─── TRANSLATION (show recipes in the selected language) ─────────
// Uses the free MyMemory API (no key, CORS-enabled), cached in localStorage so
// repeated terms are instant. English passes straight through.
const _trCache = safeParse(localStorage.getItem('kulpio-tr'), {});
function _trSave() { try { localStorage.setItem('kulpio-tr', JSON.stringify(_trCache)); } catch {} }
async function translateText(text, lang) {
  text = String(text || '').trim();
  if (!text || lang === 'en') return text;
  const key = lang + ':' + text;
  if (_trCache[key]) return _trCache[key];
  const data = await fetchJSON(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|${encodeURIComponent(lang)}`, 7000);
  const out = data && data.responseData && data.responseData.translatedText;
  if (out && !/MYMEMORY WARNING|INVALID|QUERY LENGTH|NO QUERY/i.test(out)) {
    _trCache[key] = out; _trSave(); return out;
  }
  return text;
}
function translateMany(arr, lang) { return Promise.all(arr.map(t => translateText(t, lang))); }

// Split free-text instructions into individual steps.
function splitSteps(instructions) {
  if (!instructions || !instructions.trim()) return [];
  let parts = instructions.split(/\r?\n+/).map(s => s.replace(/^\s*(?:step\s*)?\d+[.)]\s*/i, '').trim()).filter(s => s.length > 1);
  if (parts.length < 2) parts = instructions.split(/(?<=[.!?])\s+(?=[A-ZА-ЯЁ0-9])/).map(s => s.trim()).filter(s => s.length > 4);
  return parts;
}

// A relevant photo for a step: TheMealDB's photo of an ingredient the step
// mentions, otherwise the recipe's main photo.
function ingredientImg(name) {
  return `https://www.themealdb.com/images/ingredients/${encodeURIComponent(String(name).trim())}-Small.png`;
}
function stepImage(enStep, recipe) {
  const low = (enStep || '').toLowerCase();
  const hit = (recipe.ingredients || []).map(x => x.name).find(n => n && low.includes(n.toLowerCase()));
  return hit ? ingredientImg(hit) : (recipe.image || null);
}

// "+" on a suggested item: add it to the fridge ("I have it"), then refresh
// the open recipe so it flips to ✓.
function addSuggestedItem(b64) {
  const name = decodeURIComponent(atob(b64));
  if (!name) return;
  const days = estimateShelfDays(name);
  state.products.push({name, store:'', badge:freshnessBadge(days), cls:days<=1?'br':days<=5?'ba':'bg', dot:days<=1?'dr':days<=5?'da':'dg', price:0, exp:daysToDateInput(days)});
  saveState();
  if (openRecipe && document.getElementById('recipeModal').classList.contains('show')) {
    buildRecipeModal(openRecipe).then(html => {
      const body = document.getElementById('recipeModalBody');
      if (body && document.getElementById('recipeModal').classList.contains('show')) body.innerHTML = html;
    });
  }
}

// Check whether a suggested item is currently on sale (opens a shopping search).
function checkSale(b64) {
  const name = decodeURIComponent(atob(b64));
  window.open(`https://www.google.com/search?tbm=shop&q=${encodeURIComponent(name + ' ' + l('onSale'))}`, '_blank');
}

async function openRecipeDetail(idx) {
  const modal = document.getElementById('recipeModal');
  const body = document.getElementById('recipeModalBody');
  let r = shownRecipes[idx];
  if (!r) return;
  modal.classList.add('show');
  const scroller = modal.querySelector('.recipe-modal');
  if (scroller) scroller.scrollTop = 0;
  body.innerHTML = `<div class="rd-loading">${esc(l('loadingRecipe'))}</div>`;

  if (!r.instructions || !(r.ingredients && r.ingredients.length)) {
    const fetched = await fetchRecipeByName(r.title);
    if (fetched) { r = {...r, ...fetched}; shownRecipes[idx] = r; }
    if (!modal.classList.contains('show')) return; // user closed while loading
  }
  openRecipe = r;
  const html = await buildRecipeModal(r);
  if (!modal.classList.contains('show')) return;
  body.innerHTML = html;
}

// Builds the recipe detail HTML, fully translated into the selected language,
// with per-step photos and add/sale actions on items you don't have yet.
async function buildRecipeModal(r) {
  const lang = currentLang;
  const have = fridgeIngredientsEN();
  const ings = (r.ingredients && r.ingredients.length)
    ? r.ingredients
    : [...(r.used || []).map(n => ({name: n})), ...(r.missing || []).map(n => ({name: n}))];
  const enSteps = splitSteps(r.instructions);

  const [title, ingNames, stepTexts] = await Promise.all([
    translateText(r.title, lang),
    translateMany(ings.map(i => capitalize((i.name || i).toString())), lang),
    translateMany(enSteps, lang),
  ]);

  const hero = r.image
    ? `<img class="rd-hero" src="${esc(r.image)}" alt="">`
    : `<div class="rd-hero">${r.emoji || '🍽️'}</div>`;

  const rows = ings.map((ing, i) => {
    const enName = (ing.name || ing).toString();
    const has = have.some(h => h && (enName.toLowerCase().includes(h) || h.includes(enName.toLowerCase())));
    const shown = ingNames[i] || capitalize(enName);
    const measure = ing.measure || '';
    const b64 = btoa(encodeURIComponent(shown));
    const actions = has ? '' : `<span class="rd-actions">
        <button class="rd-act rd-add" title="${esc(l('save'))}" onclick="addSuggestedItem('${b64}')">+</button>
        <button class="rd-act rd-sale" onclick="checkSale('${b64}')">% ${esc(l('onSale'))}</button>
      </span>`;
    return `<div class="rd-ing">
      <span class="rd-check ${has ? 'rd-have' : 'rd-need'}">${has ? '✓' : '·'}</span>
      <span class="rd-name">${esc(shown)}</span>
      ${measure ? `<span class="rd-measure">${esc(measure)}</span>` : ''}
      ${actions}
    </div>`;
  }).join('');

  let stepsHtml;
  if (enSteps.length) {
    stepsHtml = `<ol class="rd-steplist">${enSteps.map((en, i) => {
      const img = stepImage(en, r);
      return `<li class="rd-step">
        ${img ? `<img class="rd-step-img" src="${esc(img)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}
        <span class="rd-step-txt">${esc(stepTexts[i] || en)}</span>
      </li>`;
    }).join('')}</ol>`;
  } else {
    stepsHtml = `<div class="rd-empty">${esc(l('noInstructions'))}</div>`;
  }

  const ext = r.external
    ? `<button class="rd-link" onclick="window.open(${jsArg(r.external)},'_blank')">${esc(l('sourceLink'))}</button>`
    : '';

  return `${hero}
    <div class="rd-title">${esc(title)}</div>
    <div class="rd-source">${esc(r.source || '')}</div>
    <div class="rd-section">${esc(l('ingredientsLabel'))}</div>
    ${rows}
    <div class="rd-section">${esc(l('instructionsLabel'))}</div>
    ${stepsHtml}
    ${ext}`;
}

function openScanner() {

  }

  document.getElementById('scanLine').style.display = 'block';

function closeScanner() {
  stopBarcodeScanner();
  document.getElementById('scanOverlay').classList.remove('show');
  document.getElementById('scanVideo').style.display = 'none';
}

async function startBarcodeScanner() {
  if (scannerActive) return;
  const video = document.getElementById('scanVideo');
  const status = document.getElementById('scanStatus');

  if (!window.ZXing) {
    status.textContent = l('cameraUnavailable');
    return;
  }

  try {
    codeReader = new ZXing.BrowserMultiFormatReader();
    video.style.display = 'block';
    scannerActive = true;

    await codeReader.decodeFromVideoDevice(null, video, async (result, err) => {
      if (result) {
        const barcode = result.getText();
        stopBarcodeScanner();
        video.style.display = 'none';
        await lookupBarcode(barcode);
      }
    });
  } catch (e) {
    video.style.display = 'none';
    status.textContent = (e && (e.name === 'NotAllowedError' || e.name === 'SecurityError'))
      ? l('cameraDenied') : l('cameraUnavailable');
    scannerActive = false;
  }
}

function stopBarcodeScanner() {
  scannerActive = false;
  if (codeReader) {
    try { codeReader.reset(); } catch {}
    codeReader = null;
  }
  const video = document.getElementById('scanVideo');
  if (video.srcObject) {
    video.srcObject.getTracks().forEach(t => t.stop());
    video.srcObject = null;
  }
}

async function lookupBarcode(barcode) {
  const status = document.getElementById('scanStatus');
  status.textContent = l('recognizing');
  try {
    const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
    const data = await res.json();
    if (data.status === 1 && data.product) {
      const p = data.product;
      const name = p.product_name_en || p.product_name || p.generic_name || p.product_name_ro || '';
      const store = p.stores || '';
      if (name) {
        closeScanner();
        document.getElementById('pName').value = name.trim();
        document.getElementById('pStore').value = store.trim();
        const dateEl = document.getElementById('pDate');
        dateEl.value = '';
        delete dateEl.dataset.userset;
        setEstHint('');
        document.getElementById('pPrice').value = '';
        document.getElementById('productModal').dataset.editIdx = '';
        document.getElementById('productModal').classList.add('show');
        prefillEstimate(name.trim());
        return;
      }
    }
    status.textContent = l('barcodeNotFound');
  } catch {
    status.textContent = l('barcodeNotFound');
  }
}

async function processReceiptFile(input) {
  if (!input.files || !input.files[0]) return;
  const status = document.getElementById('scanStatus');
  status.textContent = l('analyzing');
  // Try reading barcode from uploaded image
  if (window.ZXing) {
    try {
      const reader = new ZXing.BrowserMultiFormatReader();
      const url = URL.createObjectURL(input.files[0]);
      try {
        const result = await reader.decodeFromImageUrl(url);
        URL.revokeObjectURL(url);
        if (result) { closeScanner(); await lookupBarcode(result.getText()); return; }
      } catch {
        URL.revokeObjectURL(url);
      }
    } catch {}
  }
  status.textContent = l('barcodeNotFound');
}

function saveProductManual() {
  const name = document.getElementById('pName').value.trim();
  if (!name) return;
  const store = document.getElementById('pStore').value.trim() || '';
  // Persist the expiry DATE (not just a day count) so freshness recomputes

  const exp = document.getElementById('pDate').value || daysToDateInput(7);
  const price = parseFloat(document.getElementById('pPrice').value) || 0;
  const days = daysUntil(exp) ?? 7;

  const badge = freshnessBadge(days);
  const cls = days <= 1 ? 'br' : days <= 5 ? 'ba' : 'bg';

  const editIdx = document.getElementById('productModal').dataset.editIdx;
  const product = {name, store, badge, cls, dot, price, exp};

  if (editIdx !== '' && editIdx !== undefined && state.products[editIdx]) {
    state.products[parseInt(editIdx)] = product;
  } else {
    mergeOrPush(product);   // same name already in the fridge → refresh that card
  }

  recipeCacheKey = '';   // new/edited product → refresh recipe suggestions
  saveState();
  closeProductModal();
  switchTab('home', document.getElementById('tab-home'));
  if (editIdx === '' || editIdx === undefined) pearReact('hop', 'pearAdd', '😋', 700);
}

// ─── BACKUP / RESTORE ────────────────────────────────────────────
// Everything Kulpio knows lives under the "kulpio-" localStorage prefix.
// Export bundles it into one JSON file; import replaces it wholesale so a
// wiped browser cache no longer means a lost fridge, savings, or shopping list.
function exportData() {
  saveState();   // flush any in-memory state first
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith('kulpio-')) data[k] = localStorage.getItem(k);
  }
  const payload = { app: 'kulpio', version: 1, exported: new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'kulpio-backup-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function importData(input) {
  const file = input.files && input.files[0];
  input.value = '';   // allow re-picking the same file later
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let parsed;
    try { parsed = JSON.parse(reader.result); } catch { alert(l('importErr')); return; }
    const data = parsed && parsed.data && typeof parsed.data === 'object' ? parsed.data : null;
    const keys = data ? Object.keys(data).filter(k => k.startsWith('kulpio-')) : [];
    if (!keys.length) { alert(l('importErr')); return; }
    if (!confirm(l('importConfirm'))) return;
    // Clear existing kulpio- keys, then restore the backup's.
    Object.keys(localStorage).filter(k => k.startsWith('kulpio-')).forEach(k => localStorage.removeItem(k));
    keys.forEach(k => localStorage.setItem(k, data[k]));
    alert(l('importOk'));
    location.reload();
  };
  reader.onerror = () => alert(l('importErr'));
  reader.readAsText(file);
}

// ─── FOOD-LOOP SHEETS (Used it / Froze it / To buy) ──────────────
// The three chips under the tagline record what happens to your food —
// the part the rest of the app doesn't track. "Used it" credits real money
// saved; "Froze it" extends an item's life; "To buy" is a shopping list.
let sheetKind = null;
function openSheet(kind) {
  sheetKind = kind;
  renderSheet();
  document.getElementById('actionSheet').classList.add('show');
  if (kind === 'shop') setTimeout(() => { const i = document.getElementById('shopInput'); if (i) i.focus(); }, 50);
}
function closeSheet() {
  document.getElementById('actionSheet').classList.remove('show');
  sheetKind = null;
}
function renderSheet() {
  if (!sheetKind) return;
  refreshFreshness();
  const title = document.getElementById('sheetTitle');
  const body = document.getElementById('sheetBody');

  if (sheetKind === 'used') {
    title.textContent = '✅ ' + l('cUsed');
    body.innerHTML = state.products.length
      ? state.products.map((p, i) => `<div class="sheet-row" onclick="markUsed(${i})">
          <span class="sheet-act">✅</span>
          <span class="sheet-name">${esc(p.name)}</span>
          <span class="sheet-meta">${p.price > 0 ? esc(formatPrice(p.price)) : ''}</span>
        </div>`).join('')
      : `<div class="sheet-empty">${esc(l('emptyFridge'))}</div>`;

  } else if (sheetKind === 'freeze') {
    title.textContent = '❄️ ' + l('cFroze');
    const fresh = state.products.filter(p => !p.frozen);
    body.innerHTML = fresh.length
      ? state.products.map((p, i) => p.frozen ? '' : `<div class="sheet-row" onclick="freezeItem(${i})">
          <span class="sheet-act">❄️</span>
          <span class="sheet-name">${esc(p.name)}</span>
          <span class="sheet-meta">${esc(p.badge || '')}</span>
        </div>`).join('')
      : `<div class="sheet-empty">${esc(l('emptyFridge'))}</div>`;

  } else if (sheetKind === 'waste') {
    title.textContent = '🗑️ ' + l('cWasted');
    body.innerHTML = state.products.length
      ? state.products.map((p, i) => `<div class="sheet-row" onclick="markWasted(${i})">
          <span class="sheet-act">🗑️</span>
          <span class="sheet-name">${esc(p.name)}</span>
          <span class="sheet-meta">${p.price > 0 ? esc(formatPrice(p.price)) : ''}</span>
        </div>`).join('')
      : `<div class="sheet-empty">${esc(l('emptyFridge'))}</div>`;

  } else if (sheetKind === 'shop') {
    title.textContent = '🛒 ' + l('cBuy');
    const list = state.shopping || [];
    const rows = list.length
      ? list.map((it, i) => `<div class="sheet-row ${it.done ? 'done' : ''}">
          <span class="sheet-act" onclick="toggleShopItem(${i})">${it.done ? '☑' : '☐'}</span>
          <span class="sheet-name" onclick="toggleShopItem(${i})">${esc(it.name)}</span>
          ${it.done ? `<button class="shop-fridge" onclick="shopToFridge(${i})">🧊 ${esc(l('toFridge'))}</button>` : ''}
          <button class="prod-del" onclick="removeShopItem(${i})" aria-label="${esc(l('deleteItem'))}" title="${esc(l('deleteItem'))}">×</button>
        </div>`).join('')
      : `<div class="sheet-empty">${esc(l('emptyBuy'))}</div>`;
    body.innerHTML = `<form class="sheet-add" onsubmit="addShopItem(event)">
        <input id="shopInput" autocomplete="off" placeholder="${esc(l('buyPh'))}">
        <button type="submit" aria-label="Add">+</button>
      </form>${rows}`;
  }
}
// "Used it" → remove the item and credit its price to real money saved.
function markUsed(i) {
  const p = state.products[i];
  if (!p) return;
  state.saved = (state.saved || 0) + (parseFloat(p.price) || 0);
  state.usedCount = (state.usedCount || 0) + 1;
  state.products.splice(i, 1);
  recipeCacheKey = '';
  saveState();
  renderSheet();
  renderContent();
  pearEat(p.name);
  if (state.usedCount % 5 === 0) setTimeout(pearCool, 450);   // milestone: shades after the chomp
}
// "Wasted it" → remove the item and count its price as money lost to waste.
function markWasted(i) {
  const p = state.products[i];
  if (!p) return;
  state.wasted = (state.wasted || 0) + (parseFloat(p.price) || 0);
  state.lastWaste = new Date().toISOString().slice(0, 10);   // resets the waste-free streak
  state.products.splice(i, 1);
  recipeCacheKey = '';
  _noCelebrate = true;                 // don't throw a party for throwing food away
  saveState();
  renderSheet();
  renderContent();
  _noCelebrate = false;
  pearReact('sad', 'pearWasted', '🥲');
}
// "Froze it" → move to the freezer: extend the expiry ~90 days, mark frozen.
function freezeItem(i) {
  const p = state.products[i];
  if (!p) return;
  p.frozen = true;
  p.exp = daysToDateInput(90);
  saveState();
  renderSheet();
  renderContent();
  pearReact('shiver', 'pearFroze', '❄️');
}
function addShopItem(e) {
  e.preventDefault();
  const inp = document.getElementById('shopInput');
  const name = (inp.value || '').trim();
  if (!name) return;
  state.shopping = state.shopping || [];
  state.shopping.push({ name, done: false });
  saveState();
  renderSheet();
  const again = document.getElementById('shopInput');
  if (again) again.focus();
}
function toggleShopItem(i) {
  const it = state.shopping[i];
  if (it) { it.done = !it.done; saveState(); renderSheet(); }
}
function removeShopItem(i) {
  state.shopping.splice(i, 1);
  saveState();
  renderSheet();
}
// A bought item goes straight into the fridge with an auto-estimated expiry —
// closes the shopping-list → fridge loop.
function shopToFridge(i) {
  const it = state.shopping[i];
  if (!it) return;
  mergeOrPush(makeProduct(it.name));
  state.shopping.splice(i, 1);
  recipeCacheKey = '';
  saveState();
  renderSheet();
  renderContent();
  pearReact('hop', 'pearAdd', '😋', 700);
}

// ─── SETTINGS PANEL ──────────────────────────────────────────────
// The 4-squares button opens this panel. The theme / language / currency
// controls are the same live elements as before — moved into the panel so
// everything lives in one place.
function relocateSettings() {
  const move = (slotId, elId) => {
    const slot = document.getElementById(slotId), el = document.getElementById(elId);
    if (slot && el && el.parentElement !== slot) slot.appendChild(el);
  };
  move('themeSlot', 'themeSeg');
  move('langSlot', 'langSelect');
  move('currSlot', 'currencySelect');
}

// Notifications toggle: when off, hide the bell and suppress expiry alerts.
function setNotifs(on) {
  notifsEnabled = !!on;
  saveState();
  applyNotifPref();
  requestNotifPermissionIfNeeded();
}

// Ask the browser for notification permission the first time the user opts in
// (via the toggle or by opening the bell). Once granted, surface any expiring
// items straight away so the feature feels alive.
function requestNotifPermissionIfNeeded() {
  if (notifsEnabled && 'Notification' in window && Notification.permission === 'default') {
    try { Notification.requestPermission().then(() => maybeNotifyExpiring(true)); } catch {}
  }
}

// Fire a real system notification listing food that's expiring/expired. Without
// a push server this only fires while the app is open, so we cap it to once a
// day (unless forced right after the user grants permission).
function maybeNotifyExpiring(force) {
  if (!notifsEnabled) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  refreshFreshness();
  const risky = state.products.filter(p => !p.frozen && (p.cls === 'br' || p.cls === 'ba'));
  if (!risky.length) return;
  const today = new Date().toDateString();
  if (!force && localStorage.getItem('kulpio-last-notif') === today) return;
  localStorage.setItem('kulpio-last-notif', today);
  const names = risky.slice(0, 5).map(p => p.name).join(', ');
  const body = names + (risky.length > 5 ? ' +' + (risky.length - 5) : '');
  const title = '🍐 ' + l('notifHeadline');
  const opts = { body, icon: './kulpio-icon.svg', badge: './kulpio-icon.svg', tag: 'kulpio-expiry', lang: speechLang[currentLang] || 'en' };
  try {
    if (navigator.serviceWorker && navigator.serviceWorker.ready) {
      navigator.serviceWorker.ready
        .then(reg => reg.showNotification(title, opts))
        .catch(() => { try { new Notification(title, opts); } catch {} });
    } else {
      new Notification(title, opts);
    }
  } catch {}
}
function applyNotifPref() {
  const bell = document.getElementById('notifBell');
  if (bell) bell.style.display = notifsEnabled ? '' : 'none';
  const toggle = document.getElementById('notifToggle');
  if (toggle) toggle.checked = notifsEnabled;
  if (!notifsEnabled) {
    const panel = document.getElementById('notifPanel');
    if (panel) panel.classList.remove('show');
  }
}

// ─── INIT ────────────────────────────────────────────────────────
setTheme(currentTheme);
relocateSettings();   // move theme/language/currency into the Settings panel
buildAccentSwatches();
applyColorMode();
buildBgSwatches();
applyBackground(currentBg);
applySeason();   // seasonal outfit for today's date
applySky();      // day/night sky behind him
maybeNewYear();  // fireworks if it's New Year
waveHi();   // greet on open
scheduleBlink();
scheduleYawn();
scheduleIdle();
scheduleNapCheck();
scheduleBee();
// long-press the pear → love reaction (the click that may follow is swallowed)
(() => {
  const el = document.getElementById('pearIcon');
  if (!el) return;
  el.addEventListener('pointerdown', () => { clearTimeout(_pressTimer); _pressTimer = setTimeout(pearLove, 550); });
  ['pointerup', 'pointerleave', 'pointercancel'].forEach(ev => el.addEventListener(ev, () => clearTimeout(_pressTimer)));
})();
setTimeout(() => pearSay(l(greetKey())), 750);   // time-of-day hello, after the wave
render(currentLang);
applyNotifPref();
maybeNotifyExpiring();   // surface expiring food on open (if permission granted)
_ready = true;   // from here on, user restyles make him spin
// Esc closes any open overlay (extra way to leave a recipe).
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeRecipeModal();
    closeProductModal();
    closeMultiModal();
    if (document.getElementById('scanOverlay').classList.contains('show')) closeScanner();
    document.getElementById('sideMenu').classList.remove('show');
    document.getElementById('notifPanel').classList.remove('show');
    closeSheet();
    return;
  }
  // Enter / Space activate non-native clickables (tabs, product rows) so the
  // app is fully keyboard-operable. Skip when focus is on a real control
  // (button/link/field) which already handles its own keyboard activation.
  if ((e.key === 'Enter' || e.key === ' ') && e.target instanceof Element) {
    if (e.target.closest('button, a, input, select, textarea')) return;
    const hit = e.target.closest('.tab, .prod-item');
    if (hit) { e.preventDefault(); hit.click(); }
  }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
</script>
