<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kulpio</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="kulpio-icon.svg">
<meta name="theme-color" content="#0D2137">
<style>
:root {
  --bg-dark: #0D2137;
  --bg-light: #F0F8FF;
  --accent: #5BB8F5;
  --text-dark: white;
  --text-light: #0D2137;
  --card-dark: rgba(255,255,255,0.05);
  --card-light: white;
  --border-dark: rgba(255,255,255,0.1);
  --border-light: #C8E4F8;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  transition: background .3s;
  overflow-x: hidden;
}

body.dark { background: var(--bg-dark); color: var(--text-dark); }
body.light { background: var(--bg-light); color: var(--text-light); }

.top-bar {
  padding: env(safe-area-inset-top) 20px 15px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 10;
  background: inherit;
}
.top-title { font-size: 14px; letter-spacing: .1em; font-weight: 600; opacity: 0.6; }
.top-icon { font-size: 20px; cursor: pointer; }

.container { padding: 0 20px 40px; display: flex; flex-direction: column; align-items: center; }

.hero { text-align: center; padding: 20px 0; }
.assistant-logo { width: 120px; height: 120px; margin-bottom: 15px; }
.app-name { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.app-name span { color: var(--accent); }
.app-tagline { font-size: 12px; opacity: 0.5; margin-bottom: 20px; }

.voice-section { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 30px; }
.reply-bubble {
  background: var(--card-dark);
  border: 1px solid var(--border-dark);
  padding: 12px 20px;
  border-radius: 20px;
  font-size: 14px;
  text-align: center;
  max-width: 80%;
  min-height: 40px;
  transition: all .3s;
  opacity: 0;
  transform: translateY(10px);
}
.reply-bubble.show { opacity: 1; transform: translateY(0); }
body.light .reply-bubble { background: #E8F4FD; border-color: var(--border-light); color: #1A5F8A; }

.mic-btn {
  width: 64px; height: 64px; border-radius: 50%;
  background: var(--accent); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .2s; font-size: 24px;
  box-shadow: 0 4px 15px rgba(91,184,245,0.3);
}
.mic-btn.active { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(91,184,245,0.2); }
.mic-hint { font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

.wave { display: flex; gap: 4px; height: 20px; opacity: 0; transition: .3s; margin: 10px 0; }
.wave.show { opacity: 1; }
.wave-bar { width: 3px; background: var(--accent); border-radius: 2px; animation: wa .8s ease-in-out infinite; }
@keyframes wa { 0%,100% { transform: scaleY(.4); } 50% { transform: scaleY(1); } }
.wave-bar:nth-child(1) { height: 8px; animation-delay: 0s; }
.wave-bar:nth-child(2) { height: 16px; animation-delay: .1s; }
.wave-bar:nth-child(3) { height: 20px; animation-delay: .2s; }
.wave-bar:nth-child(4) { height: 16px; animation-delay: .1s; }
.wave-bar:nth-child(5) { height: 8px; animation-delay: 0s; }

.list-header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.list-label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.5; }
.add-btn { 
  background: var(--accent); color: white; border: none; 
  width: 36px; height: 36px; border-radius: 50%; 
  font-size: 22px; cursor: pointer; font-weight: bold;
  display: flex; align-items: center; justify-content: center;
}

.product-card {
  width: 100%; background: var(--card-dark);
  border: 1px solid var(--border-dark);
  border-radius: 16px; padding: 12px;
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 10px; transition: .2s;
  animation: slideIn .3s ease-out;
}
body.light .product-card { background: var(--card-light); border-color: var(--border-light); }
@keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }

.status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.dot-red { background: #F44336; } .dot-orange { background: #FF9800; } .dot-green { background: #4CAF50; }

.prod-info { flex: 1; }
.prod-name { font-size: 15px; font-weight: 500; }
.prod-store { font-size: 12px; opacity: 0.5; }

.prod-badge {
  font-size: 11px; padding: 4px 10px; border-radius: 20px; font-weight: 600;
}
.badge-red { background: rgba(244,67,54,0.15); color: #FF8A80; }
.badge-orange { background: rgba(255,152,0,0.15); color: #FFCC80; }
.badge-green { background: rgba(76,175,80,0.15); color: #69c96e; }

.delete-btn { 
  background: transparent; border: none; color: inherit; 
  opacity: 0.3; cursor: pointer; font-size: 18px; transition: .2s;
}
.delete-btn:hover { opacity: 1; color: #F44336; }

.modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); display: none; align-items: center;
  justify-content: center; z-index: 100; padding: 20px;
  backdrop-filter: blur(5px);
}
.modal.show { display: flex; }
.modal-content {
  background: var(--bg-dark); width: 100%; max-width: 400px;
  border-radius: 24px; padding: 24px; border: 1px solid var(--border-dark);
}
body.light .modal-content { background: var(--bg-light); border-color: var(--border-light); }

.modal-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; text-align: center; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 12px; opacity: 0.6; margin-bottom: 5px; }
.form-group input {
  width: 100%; padding: 12px; border-radius: 12px;
  border: 1px solid var(--border-dark); background: rgba(255,255,255,0.05);
  color: inherit; font-size: 16px; outline: none;
}
body.light .form-group input { background: white; border-color: var(--border-light); }

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn {
  flex: 1; padding: 12px; border-radius: 12px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer; transition: .2s;
}
.btn-cancel { background: rgba(255,255,255,0.1); color: inherit; }
.btn-save { background: var(--accent); color: white; }

</style>
</head>
<body class="dark">

<div class="top-bar">
  <span class="top-title">KULPIO</span>
  <div class="top-icon" onclick="toggleTheme()">🌓</div>
</div>

<div class="container">
  <div class="hero">
    <!-- LOGO: Removed background rect, kept only the bird -->
    <svg class="assistant-logo" viewBox="0 0 220 220">
      <path d="M71 164C71 96 98 57 150 64C178 68 196 90 199 119C202 156 176 182 139 185C111 187 92 176 71 179Z" fill="var(--accent)"/>
      <circle cx="162" cy="98" r="21" fill="white"/>
      <circle cx="162" cy="98" r="12" fill="#000"/>
      <circle cx="157" cy="92" r="4" fill="white"/>
      <polygon points="198,103 218,116 198,129" fill="#FFA726"/>
    </svg>
    <div class="app-name">kul<span>pio</span></div>
    <div class="app-tagline" id="tagline">stay fresh.</div>
  </div>

  <div class="voice-section">
    <div class="reply-bubble" id="reply">Привет! Твой холодильник пока пуст.</div>
    <div class="wave" id="wave">
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
    <button class="mic-btn" id="micBtn" onclick="handleVoice()">🎙️</button>
    <div class="mic-hint" id="micHint">Нажми, чтобы сказать</div>
  </div>

  <div class="list-header">
    <div class="list-label" id="fridgeLabel">Мой холодильник</div>
    <button class="add-btn" onclick="openModal()">+</button>
  </div>

  <div id="productList">
    <!-- Products injected here -->
  </div>
</div>

<div class="modal" id="productModal">
  <div class="modal-content">
    <div class="modal-title">Новый продукт</div>
    <div class="form-group">
      <label>Название</label>
      <input type="text" id="prodName" placeholder="Напр: Молоко 1Л">
    </div>
    <div class="form-group">
      <label>Магазин</label>
      <input type="text" id="prodStore" placeholder="Напр: Lidl">
    </div>
    <div class="form-group">
      <label>Дата истечения</label>
      <input type="date" id="prodDate">
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn btn-save" onclick="saveProduct()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ─── STATE MANAGEMENT ───────────────────────────────────────────
// Default products removed. Now starts empty.
let products = JSON.parse(localStorage.getItem('kulpio_products')) || [];

function saveToLocalStorage() {
  localStorage.setItem('kulpio_products', JSON.stringify(products));
}

// ─── UI LOGIC ───────────────────────────────────────────────────
function toggleTheme() {
  document.body.classList.toggle('dark');
  document.body.classList.toggle('light');
}

function openModal() { document.getElementById('productModal').classList.add('show'); }
function closeModal() { document.getElementById('productModal').classList.remove('show'); }

function saveProduct() {
  const name = document.getElementById('prodName').value;
  const store = document.getElementById('prodStore').value;
  const date = document.getElementById('prodDate').value;

  if(!name || !date) return alert('Заполни название и дату!');

  const newProd = { id: Date.now(), name, store, date };
  products.push(newProd);
  saveToLocalStorage();
  renderProducts();
  closeModal();
  
  document.getElementById('prodName').value = '';
  document.getElementById('prodStore').value = '';
  document.getElementById('prodDate').value = '';
}

function deleteProduct(id) {
  products = products.filter(p => p.id !== id);
  saveToLocalStorage();
  renderProducts();
}

function getFreshness(dateStr) {
  const now = new Date();
  now.setHours(0,0,0,0);
  const exp = new Date(dateStr);
  exp.setHours(0,0,0,0);
  
  const diff = Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
  
  if (diff < 0) return { label: 'Истекло', cls: 'red' };
  if (diff <= 2) return { label: 'Завтра', cls: 'red' };
  if (diff <= 7) return { label: `${diff} дн.`, cls: 'orange' };
  return { label: `${diff} дн.`, cls: 'green' };
}

function renderProducts() {
  const list = document.getElementById('productList');
  list.innerHTML = '';

  if(products.length === 0) {
    list.innerHTML = '<div style="text-align:center; opacity:0.5; margin-top:20px;">Холодильник пуст...</div>';
    return;
  }

  products.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(p => {
    const fresh = getFreshness(p.date);
    list.innerHTML += `
      <div class="product-card">
        <div class="status-dot dot-${fresh.cls}"></div>
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-store">${p.store || 'Не указан'}</div>
        </div>
        <div class="prod-badge badge-${fresh.cls}">${fresh.label}</div>
        <button class="delete-btn" onclick="deleteProduct(${p.id})">✕</button>
      </div>
    `;
  });
}

// ─── VOICE SYSTEM ──────────────────────────────────────────────
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;

if (SpeechRecognition) {
  recognition = new SpeechRecognition();
  recognition.lang = 'ru-RU';
  recognition.continuous = false;

  recognition.onstart = () => {
    document.getElementById('micBtn').classList.add('active');
    document.getElementById('wave').classList.add('show');
    document.getElementById('micHint').textContent = 'Слушаю...';
  };

  recognition.onend = () => {
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('wave').classList.remove('show');
    document.getElementById('micHint').textContent = 'Нажми, чтобы сказать';
  };

  recognition.onresult = (event) => {
    const text = event.results[0][0].transcript.toLowerCase();
    handleVoiceCommand(text);
  };
}

function handleVoice() {
  if(!recognition) return alert('Ваш браузер не поддерживает голосовой ввод. Попробуйте Chrome.');
  recognition.start();
}

function handleVoiceCommand(text) {
  const reply = document.getElementById('reply');
  let response = 'Я не совсем понял, но я учусь!';

  if(text.includes('рецепт')) {
    response = 'Ищу рецепты из твоих продуктов... Попробуй сделать омлет!';
  } else if(text.includes('истекает') || text.includes('сроки')) {
    const critical = products.filter(p => getFreshness(p.date).cls === 'red');
    response = critical.length 
      ? `Скоро истекает: ${critical.map(p => p.name).join(', ')}` 
      : 'Все продукты в порядке!';
  } else if(text.includes('добавь') || text.includes('купил')) {
    response = 'Открой форму добавления, чтобы я точно записал дату!';
    openModal();
  } else if(text.includes('привет')) {
    response = 'Привет! Я Kulpio. Помогу следить за свежестью еды.';
  }

  showReply(response);
}

function showReply(text) {
  const r = document.getElementById('reply');
  r.classList.remove('show');
  setTimeout(() => {
    r.textContent = text;
    r.classList.add('show');
  }, 200);
}

// Init
renderProducts();
showReply('Привет! Твой холодильник пока пуст.');
</script>
</body>
</html>
