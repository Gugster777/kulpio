// First-run tour: 5 cards + buttons + menu entry, all 33 languages.
const L26 = {
  en:{tT1:"Meet Kulpio",tB1:"Your fridge sidekick: track what you have, waste less and save money. The pear always shows how your fridge feels.",tT2:"Add your food",tB2:"Add items by hand, paste a whole list, or scan with the camera. No expiry date? Kulpio estimates one for you.",tT3:"Watch freshness",tB3:"Green means fresh, red means eat soon. The Week ahead strip shows what expires on which day — tap a day to filter.",tT4:"Close the loop",tB4:"Ate something? Tap Used it. Froze it pauses the clock, Wasted counts the loss, and To buy plans your next trip — with a price estimate.",tT5:"Save & win",tB5:"Savings shows money saved and money at risk. Profile tracks your streak, badges and monthly recap. The pear celebrates every win with you.",tNext:"Next",tSkip:"Skip",tDone:"Let's go!",menuGuide:"Guide"},
  ru:{tT1:"Знакомься: Кульпио",tB1:"Твой помощник по холодильнику: следи за продуктами, выбрасывай меньше и экономь. Груша всегда показывает, как дела у холодильника.",tT2:"Добавляй продукты",tB2:"Добавляй вручную, вставь целый список или отсканируй камерой. Нет срока годности? Кульпио прикинет сам.",tT3:"Следи за свежестью",tB3:"Зелёное — свежее, красное — съешь скорее. Полоса «Ближайшая неделя» показывает, что и когда истекает — нажми на день, чтобы отфильтровать.",tT4:"Замкни круг",tB4:"Съел что-то? Нажми «Использовал». «Заморозил» ставит время на паузу, «Выбросил» считает потери, а «Купить» планирует поход в магазин с примерной суммой.",tT5:"Экономь и побеждай",tB5:"«Выгода» показывает сэкономленное и деньги под угрозой. В профиле — серия, награды и итоги месяца. Груша празднует каждую победу вместе с тобой.",tNext:"Далее",tSkip:"Пропустить",tDone:"Поехали!",menuGuide:"Гид"},
  ro:{tT1:"Fă cunoștință cu Kulpio",tB1:"Ajutorul tău de frigider: urmărește ce ai, risipește mai puțin și economisește. Para îți arată mereu cum se simte frigiderul.",tT2:"Adaugă alimente",tB2:"Adaugă manual, lipește o listă întreagă sau scanează cu camera. Fără dată de expirare? Kulpio o estimează singur.",tT3:"Urmărește prospețimea",tB3:"Verde înseamnă proaspăt, roșu — mănâncă repede. Banda „Săptămâna următoare” arată ce expiră și când — atinge o zi pentru filtrare.",tT4:"Închide cercul",tB4:"Ai mâncat ceva? Apasă „Folosit”. „Congelat” oprește ceasul, „Aruncat” numără pierderile, iar „De cumpărat” planifică următorul drum — cu preț estimat.",tT5:"Economisește și câștigă",tB5:"„Economii” arată banii economisiți și cei în pericol. Profilul ține seria, insignele și bilanțul lunar. Para sărbătorește fiecare victorie cu tine.",tNext:"Înainte",tSkip:"Sari",tDone:"Să începem!",menuGuide:"Ghid"},
  de:{tT1:"Das ist Kulpio",tB1:"Dein Kühlschrank-Helfer: Behalte den Überblick, verschwende weniger und spare Geld. Die Birne zeigt dir immer, wie es dem Kühlschrank geht.",tT2:"Füge Essen hinzu",tB2:"Von Hand, als ganze Liste oder per Kamera-Scan. Kein Ablaufdatum? Kulpio schätzt eines für dich.",tT3:"Frische im Blick",tB3:"Grün heißt frisch, Rot heißt bald essen. Der Wochenüberblick zeigt, was wann abläuft — tippe auf einen Tag zum Filtern.",tT4:"Schließe den Kreis",tB4:"Etwas gegessen? Tippe auf Verbraucht. Eingefroren hält die Uhr an, Weggeworfen zählt Verluste, Einkaufen plant den nächsten Einkauf — mit Preisschätzung.",tT5:"Sparen & gewinnen",tB5:"Einsparungen zeigt gespartes und gefährdetes Geld. Das Profil zählt Serie, Abzeichen und Monatsbilanz. Die Birne feiert jeden Erfolg mit dir.",tNext:"Weiter",tSkip:"Überspringen",tDone:"Los geht's!",menuGuide:"Anleitung"},
  fr:{tT1:"Voici Kulpio",tB1:"Ton allié frigo : garde l'œil sur tes provisions, gaspille moins, économise plus. La poire montre toujours l'état du frigo.",tT2:"Ajoute tes aliments",tB2:"À la main, en collant une liste entière ou en scannant. Pas de date ? Kulpio l'estime pour toi.",tT3:"Surveille la fraîcheur",tB3:"Vert = frais, rouge = à manger vite. La semaine à venir montre ce qui expire quel jour — touche un jour pour filtrer.",tT4:"Boucle la boucle",tB4:"Tu as mangé quelque chose ? Touche Utilisé. Congelé met le temps en pause, Gaspillé compte les pertes, Acheter prépare les courses — prix estimé inclus.",tT5:"Économise et gagne",tB5:"Économies montre l'argent économisé et en jeu. Le profil suit ta série, tes badges et ton bilan du mois. La poire fête chaque victoire avec toi.",tNext:"Suivant",tSkip:"Passer",tDone:"C'est parti !",menuGuide:"Guide"},
  es:{tT1:"Conoce a Kulpio",tB1:"Tu aliado de la nevera: controla lo que tienes, desperdicia menos y ahorra. La pera siempre muestra cómo está tu nevera.",tT2:"Añade tu comida",tB2:"A mano, pegando una lista entera o escaneando con la cámara. ¿Sin fecha? Kulpio la estima por ti.",tT3:"Vigila la frescura",tB3:"Verde es fresco, rojo es para comer pronto. Los próximos 7 días muestran qué caduca cada día: toca un día para filtrar.",tT4:"Cierra el ciclo",tB4:"¿Comiste algo? Toca Usado. Congelado pausa el reloj, Desperdiciado cuenta la pérdida y Comprar planea la próxima compra con precio estimado.",tT5:"Ahorra y gana",tB5:"Ahorros muestra el dinero ahorrado y en riesgo. El perfil lleva tu racha, insignias y resumen mensual. La pera celebra cada logro contigo.",tNext:"Siguiente",tSkip:"Omitir",tDone:"¡Vamos!",menuGuide:"Guía"},
  it:{tT1:"Ecco Kulpio",tB1:"Il tuo alleato del frigo: tieni d'occhio le scorte, spreca meno e risparmia. La pera mostra sempre come sta il frigo.",tT2:"Aggiungi il cibo",tB2:"A mano, incollando una lista intera o con la fotocamera. Niente scadenza? Kulpio la stima per te.",tT3:"Controlla la freschezza",tB3:"Verde è fresco, rosso è da mangiare presto. I prossimi 7 giorni mostrano cosa scade e quando: tocca un giorno per filtrare.",tT4:"Chiudi il cerchio",tB4:"Hai mangiato qualcosa? Tocca Usato. Congelato ferma il tempo, Sprecato conta le perdite, Da comprare pianifica la spesa con prezzo stimato.",tT5:"Risparmia e vinci",tB5:"Risparmi mostra i soldi risparmiati e a rischio. Il profilo tiene serie, medaglie e riepilogo mensile. La pera festeggia ogni vittoria con te.",tNext:"Avanti",tSkip:"Salta",tDone:"Si parte!",menuGuide:"Guida"},
  pt:{tT1:"Conheça o Kulpio",tB1:"Seu parceiro de geladeira: acompanhe o que tem, desperdice menos e economize. A pera sempre mostra como está a geladeira.",tT2:"Adicione sua comida",tB2:"À mão, colando uma lista inteira ou escaneando com a câmera. Sem validade? O Kulpio estima para você.",tT3:"Fique de olho no frescor",tB3:"Verde é fresco, vermelho é para comer logo. Os próximos 7 dias mostram o que vence em cada dia — toque num dia para filtrar.",tT4:"Feche o ciclo",tB4:"Comeu algo? Toque em Usado. Congelado pausa o relógio, Desperdiçado conta a perda e Comprar planeja a próxima ida ao mercado — com preço estimado.",tT5:"Economize e vença",tB5:"Economias mostra o dinheiro poupado e em risco. O perfil acompanha sequência, medalhas e resumo do mês. A pera comemora cada vitória com você.",tNext:"Avançar",tSkip:"Pular",tDone:"Vamos lá!",menuGuide:"Guia"},
  pl:{tT1:"Poznaj Kulpio",tB1:"Twój pomocnik od lodówki: pilnuj zapasów, marnuj mniej i oszczędzaj. Gruszka zawsze pokazuje, jak ma się lodówka.",tT2:"Dodawaj jedzenie",tB2:"Ręcznie, wklejając całą listę albo skanując aparatem. Brak daty? Kulpio ją oszacuje.",tT3:"Pilnuj świeżości",tB3:"Zielone jest świeże, czerwone — zjedz szybko. Nadchodzący tydzień pokazuje, co i kiedy się kończy — dotknij dnia, by filtrować.",tT4:"Zamknij obieg",tB4:"Zjadłeś coś? Dotknij Zużyte. Zamrożone zatrzymuje zegar, Zmarnowane liczy straty, a Do kupienia planuje zakupy z szacowaną kwotą.",tT5:"Oszczędzaj i wygrywaj",tB5:"Oszczędności pokazują pieniądze zaoszczędzone i zagrożone. Profil śledzi serię, odznaki i podsumowanie miesiąca. Gruszka świętuje z tobą każdy sukces.",tNext:"Dalej",tSkip:"Pomiń",tDone:"Zaczynamy!",menuGuide:"Przewodnik"},
  tr:{tT1:"Kulpio ile tanış",tB1:"Buzdolabı yardımcın: elindekini takip et, daha az israf et, para biriktir. Armut buzdolabının halini her zaman gösterir.",tT2:"Yiyecek ekle",tB2:"Elle ekle, tam liste yapıştır ya da kamerayla tara. Tarih yok mu? Kulpio senin için tahmin eder.",tT3:"Tazeliği izle",tB3:"Yeşil taze, kırmızı hemen ye demek. Önümüzdeki hafta şeridi neyin ne zaman dolacağını gösterir — filtrelemek için bir güne dokun.",tT4:"Döngüyü kapat",tB4:"Bir şey mi yedin? Kullanıldı'ya dokun. Donduruldu saati durdurur, İsraf kaybı sayar, Alınacaklar bir sonraki alışverişi tahmini fiyatla planlar.",tT5:"Biriktir ve kazan",tB5:"Tasarruf, biriken ve risk altındaki parayı gösterir. Profil seri, rozet ve aylık özeti tutar. Armut her zaferi seninle kutlar.",tNext:"İleri",tSkip:"Geç",tDone:"Başlayalım!",menuGuide:"Rehber"},
  ar:{tT1:"تعرّف على كولبيو",tB1:"مساعدك للثلاجة: تابع ما لديك، قلّل الهدر ووفّر المال. الكمثرى تُظهر دائماً حال ثلاجتك.",tT2:"أضف طعامك",tB2:"أضف يدوياً، أو الصق قائمة كاملة، أو امسح بالكاميرا. لا يوجد تاريخ صلاحية؟ كولبيو يقدّره لك.",tT3:"راقب الطزاجة",tB3:"الأخضر طازج، والأحمر كُله سريعاً. شريط الأسبوع القادم يُظهر ما ينتهي ومتى — اضغط على يوم للتصفية.",tT4:"أغلق الدورة",tB4:"أكلت شيئاً؟ اضغط استخدمته. جمّدته يوقف الوقت، رميته يحسب الخسارة، وللشراء يخطط للرحلة القادمة مع سعر تقديري.",tT5:"وفّر واربح",tB5:"التوفير يعرض المال الموفَّر والمعرّض للخطر. الملف يتابع سلسلتك وأوسمتك وملخص الشهر. الكمثرى تحتفل معك بكل فوز.",tNext:"التالي",tSkip:"تخطَّ",tDone:"هيا بنا!",menuGuide:"الدليل"},
  zh:{tT1:"认识 Kulpio",tB1:"你的冰箱助手：掌握库存，少浪费，多省钱。梨子随时告诉你冰箱的状态。",tT2:"添加食材",tB2:"手动添加、粘贴整份清单，或用相机扫描。没有保质期？Kulpio 帮你估算。",tT3:"关注新鲜度",tB3:"绿色表示新鲜，红色表示要尽快吃。未来一周条显示每天到期的食材——点一天即可筛选。",tT4:"完成闭环",tB4:"吃掉了？点“已用完”。“已冷冻”暂停计时，“已浪费”记录损失，“待购买”帮你规划下次采购并估算花费。",tT5:"省钱赢徽章",tB5:"“节省”显示省下和面临损失的钱；“我的”记录连胜、徽章和每月小结。梨子和你一起庆祝每次胜利。",tNext:"下一步",tSkip:"跳过",tDone:"开始吧！",menuGuide:"使用指南"},
  ja:{tT1:"Kulpioへようこそ",tB1:"冷蔵庫の相棒。あるものを把握して、むだを減らして節約しよう。梨はいつでも冷蔵庫の気分を教えてくれる。",tT2:"食材を追加",tB2:"手入力、リストの貼り付け、カメラでスキャンもOK。期限が不明ならKulpioが推定します。",tT3:"鮮度をチェック",tB3:"緑は新鮮、赤は早めに食べて。今後1週間バーでいつ何が切れるか分かる——日をタップで絞り込み。",tT4:"サイクルを回そう",tB4:"食べたら「使った」をタップ。「冷凍」で時間停止、「むだにした」で損失を記録、「買う物」は概算付きで次の買い物を計画。",tT5:"節約して勝とう",tB5:"節約タブで貯めたお金と危ないお金が見える。プロフィールには連続記録・実績・月のまとめ。勝利は梨と一緒にお祝い。",tNext:"次へ",tSkip:"スキップ",tDone:"はじめる！",menuGuide:"ガイド"},
  ko:{tT1:"Kulpio를 소개합니다",tB1:"냉장고 도우미: 재고를 파악하고, 덜 버리고, 돈을 아끼세요. 배는 언제나 냉장고 상태를 알려줍니다.",tT2:"식품 추가",tB2:"직접 입력하거나 목록을 붙여넣거나 카메라로 스캔하세요. 유통기한이 없으면 Kulpio가 추정해 드려요.",tT3:"신선도 확인",tB3:"초록은 신선, 빨강은 빨리 드세요. 일주일 스트립이 언제 무엇이 만료되는지 보여줍니다 — 날짜를 눌러 필터링.",tT4:"순환 완성",tB4:"드셨나요? 사용함을 누르세요. 냉동은 시간을 멈추고, 낭비는 손실을 기록하고, 구매 목록은 예상 금액과 함께 장보기를 계획합니다.",tT5:"아끼고 이기기",tB5:"절약 탭은 아낀 돈과 위험한 돈을 보여줍니다. 프로필에는 연속 기록, 배지, 월간 요약이 있어요. 배가 모든 승리를 함께 축하합니다.",tNext:"다음",tSkip:"건너뛰기",tDone:"시작해요!",menuGuide:"가이드"},
  hi:{tT1:"Kulpio से मिलें",tB1:"आपका फ्रिज साथी: सामान पर नज़र रखें, कम बर्बाद करें और पैसे बचाएँ। नाशपाती हमेशा बताती है कि फ्रिज का हाल कैसा है।",tT2:"खाना जोड़ें",tB2:"हाथ से जोड़ें, पूरी सूची चिपकाएँ या कैमरे से स्कैन करें। तारीख़ नहीं? Kulpio अनुमान लगा देगा।",tT3:"ताज़गी देखें",tB3:"हरा यानी ताज़ा, लाल यानी जल्दी खाएँ। आने वाला सप्ताह दिखाता है कि क्या कब खत्म होगा — दिन पर टैप करके फ़िल्टर करें।",tT4:"चक्र पूरा करें",tB4:"कुछ खाया? इस्तेमाल किया दबाएँ। फ्रीज़ किया घड़ी रोकता है, बर्बाद हुआ नुकसान गिनता है, और खरीदना अगली खरीदारी की योजना बनाता है — अनुमानित कीमत के साथ।",tT5:"बचाएँ और जीतें",tB5:"बचत में बचा और जोखिम में पैसा दिखता है। प्रोफ़ाइल में स्ट्रीक, बैज और मासिक सार है। नाशपाती हर जीत आपके साथ मनाती है।",tNext:"आगे",tSkip:"छोड़ें",tDone:"चलिए!",menuGuide:"गाइड"},
  uk:{tT1:"Знайомся: Кульпіо",tB1:"Твій помічник для холодильника: стеж за продуктами, викидай менше та заощаджуй. Груша завжди показує, як почувається холодильник.",tT2:"Додавай продукти",tB2:"Вручну, встав цілий список або відскануй камерою. Немає терміну? Кульпіо оцінить сам.",tT3:"Стеж за свіжістю",tB3:"Зелене — свіже, червоне — з'їж швидше. Смуга «Найближчий тиждень» показує, що й коли спливає — торкнись дня, щоб відфільтрувати.",tT4:"Замкни коло",tB4:"З'їв щось? Натисни «Використав». «Заморозив» зупиняє час, «Викинув» рахує втрати, а «Купити» планує похід у магазин з орієнтовною сумою.",tT5:"Заощаджуй і перемагай",tB5:"«Заощадження» показує збережені гроші та гроші під загрозою. У профілі — серія, нагороди й підсумок місяця. Груша святкує кожну перемогу з тобою.",tNext:"Далі",tSkip:"Пропустити",tDone:"Поїхали!",menuGuide:"Гід"},
  nl:{tT1:"Dit is Kulpio",tB1:"Je koelkastmaatje: houd bij wat je hebt, verspil minder en bespaar geld. De peer laat altijd zien hoe je koelkast zich voelt.",tT2:"Voeg je eten toe",tB2:"Met de hand, plak een hele lijst of scan met de camera. Geen datum? Kulpio schat er een voor je.",tT3:"Let op versheid",tB3:"Groen is vers, rood is snel opeten. De komende week laat zien wat wanneer verloopt — tik op een dag om te filteren.",tT4:"Maak de cirkel rond",tB4:"Iets gegeten? Tik op Gebruikt. Ingevroren pauzeert de klok, Verspild telt het verlies en Kopen plant je volgende boodschappen — met prijsschatting.",tT5:"Bespaar en win",tB5:"Besparing toont gespaard en bedreigd geld. Je profiel houdt reeks, badges en maandoverzicht bij. De peer viert elke overwinning met je mee.",tNext:"Volgende",tSkip:"Overslaan",tDone:"Daar gaan we!",menuGuide:"Gids"},
  sv:{tT1:"Möt Kulpio",tB1:"Din kylskåpskompis: håll koll på vad du har, släng mindre och spara pengar. Päronet visar alltid hur kylen mår.",tT2:"Lägg till mat",tB2:"För hand, klistra in en hel lista eller skanna med kameran. Inget datum? Kulpio uppskattar ett åt dig.",tT3:"Håll koll på färskheten",tB3:"Grönt är färskt, rött ska ätas snart. Veckan framöver visar vad som går ut när — tryck på en dag för att filtrera.",tT4:"Slut cirkeln",tB4:"Ätit något? Tryck på Använd. Fryst pausar klockan, Slängt räknar förlusten och Att köpa planerar nästa inköp — med prisuppskattning.",tT5:"Spara och vinn",tB5:"Besparingar visar sparade och hotade pengar. Profilen håller svit, märken och månadssummering. Päronet firar varje seger med dig.",tNext:"Nästa",tSkip:"Hoppa över",tDone:"Nu kör vi!",menuGuide:"Guide"},
  no:{tT1:"Møt Kulpio",tB1:"Kjøleskapshjelperen din: hold oversikt, kast mindre og spar penger. Pæren viser alltid hvordan kjøleskapet har det.",tT2:"Legg til mat",tB2:"For hånd, lim inn en hel liste eller skann med kameraet. Ingen dato? Kulpio anslår en for deg.",tT3:"Følg med på ferskheten",tB3:"Grønt er ferskt, rødt bør spises snart. Uken fremover viser hva som går ut når — trykk på en dag for å filtrere.",tT4:"Fullfør sirkelen",tB4:"Spist noe? Trykk på Brukt. Frosset stopper klokken, Kastet teller tapet og Å kjøpe planlegger neste handletur — med prisanslag.",tT5:"Spar og vinn",tB5:"Besparelser viser sparte og truede penger. Profilen holder rekke, merker og månedsoppsummering. Pæren feirer hver seier med deg.",tNext:"Neste",tSkip:"Hopp over",tDone:"Da setter vi i gang!",menuGuide:"Guide"},
  da:{tT1:"Mød Kulpio",tB1:"Din køleskabsmakker: hold styr på hvad du har, spild mindre og spar penge. Pæren viser altid hvordan køleskabet har det.",tT2:"Tilføj din mad",tB2:"I hånden, indsæt en hel liste eller scan med kameraet. Ingen dato? Kulpio anslår en for dig.",tT3:"Hold øje med friskheden",tB3:"Grønt er frisk, rødt skal spises snart. Ugen frem viser hvad der udløber hvornår — tryk på en dag for at filtrere.",tT4:"Luk cirklen",tB4:"Spist noget? Tryk på Brugt. Frosset sætter uret på pause, Smidt ud tæller tabet og At købe planlægger næste indkøb — med prisoverslag.",tT5:"Spar og vind",tB5:"Besparelser viser sparede og truede penge. Profilen holder stime, mærker og månedsoverblik. Pæren fejrer hver sejr med dig.",tNext:"Næste",tSkip:"Spring over",tDone:"Så er det nu!",menuGuide:"Guide"},
  fi:{tT1:"Tässä on Kulpio",tB1:"Jääkaappiapurisi: pidä kirjaa ruoistasi, hukkaa vähemmän ja säästä rahaa. Päärynä näyttää aina, miltä jääkaapista tuntuu.",tT2:"Lisää ruokaa",tB2:"Käsin, liimaa kokonainen lista tai skannaa kameralla. Ei päiväystä? Kulpio arvioi sen puolestasi.",tT3:"Seuraa tuoreutta",tB3:"Vihreä on tuoretta, punainen pitää syödä pian. Tuleva viikko näyttää, mikä vanhenee milloinkin — napauta päivää suodattaaksesi.",tT4:"Sulje kierto",tB4:"Söitkö jotain? Napauta Käytetty. Pakastettu pysäyttää kellon, Hukattu laskee tappiot ja Ostettavaa suunnittelee seuraavan kauppareissun — hinta-arviolla.",tT5:"Säästä ja voita",tB5:"Säästöt näyttää säästetyt ja vaarassa olevat rahat. Profiili pitää putken, merkit ja kuukausikoosteen. Päärynä juhlii jokaista voittoa kanssasi.",tNext:"Seuraava",tSkip:"Ohita",tDone:"Aloitetaan!",menuGuide:"Opas"},
  cs:{tT1:"Seznam se s Kulpiem",tB1:"Tvůj parťák k lednici: měj přehled, vyhazuj méně a šetři peníze. Hruška vždy ukazuje, jak se lednici daří.",tT2:"Přidej jídlo",tB2:"Ručně, vlož celý seznam nebo naskenuj kamerou. Bez data? Kulpio ho odhadne za tebe.",tT3:"Hlídej čerstvost",tB3:"Zelená je čerstvé, červená sněz brzy. Nadcházející týden ukazuje, co kdy končí — klepni na den pro filtr.",tT4:"Uzavři koloběh",tB4:"Snědl jsi něco? Klepni na Spotřebováno. Zmraženo zastaví čas, Vyhozeno počítá ztráty a Koupit plánuje další nákup — s odhadem ceny.",tT5:"Šetři a vyhrávej",tB5:"Úspory ukazují ušetřené i ohrožené peníze. Profil vede sérii, odznaky a měsíční přehled. Hruška slaví každé vítězství s tebou.",tNext:"Další",tSkip:"Přeskočit",tDone:"Jdeme na to!",menuGuide:"Průvodce"},
  sk:{tT1:"Zoznám sa s Kulpiom",tB1:"Tvoj parťák k chladničke: maj prehľad, vyhadzuj menej a šetri peniaze. Hruška vždy ukazuje, ako sa chladničke darí.",tT2:"Pridaj jedlo",tB2:"Ručne, vlož celý zoznam alebo naskenuj kamerou. Bez dátumu? Kulpio ho odhadne za teba.",tT3:"Sleduj čerstvosť",tB3:"Zelená je čerstvé, červená zjedz čoskoro. Nadchádzajúci týždeň ukazuje, čo kedy končí — ťukni na deň pre filter.",tT4:"Uzavri kolobeh",tB4:"Zjedol si niečo? Ťukni na Spotrebované. Zmrazené zastaví čas, Vyhodené počíta straty a Kúpiť plánuje ďalší nákup — s odhadom ceny.",tT5:"Šetri a vyhrávaj",tB5:"Úspory ukazujú ušetrené aj ohrozené peniaze. Profil vedie sériu, odznaky a mesačný prehľad. Hruška oslavuje každé víťazstvo s tebou.",tNext:"Ďalej",tSkip:"Preskočiť",tDone:"Poďme na to!",menuGuide:"Sprievodca"},
  hu:{tT1:"Ismerd meg Kulpiót",tB1:"A hűtőd segítője: tartsd számon, mid van, pazarolj kevesebbet és spórolj. A körte mindig mutatja, hogy érzi magát a hűtő.",tT2:"Add hozzá az ételeket",tB2:"Kézzel, egész lista beillesztésével vagy kamerás szkenneléssel. Nincs dátum? Kulpio megbecsüli helyetted.",tT3:"Figyeld a frissességet",tB3:"A zöld friss, a piros hamarosan lejár. A következő hét sáv mutatja, mi mikor jár le — koppints egy napra a szűréshez.",tT4:"Zárd a kört",tB4:"Ettél valamit? Koppints a Felhasználva gombra. A Lefagyasztva megállítja az órát, a Kidobva számolja a veszteséget, a Vásárolni pedig a következő bevásárlást tervezi — becsült árral.",tT5:"Spórolj és nyerj",tB5:"A Megtakarítás mutatja a megspórolt és veszélyben lévő pénzt. A profil követi a szériát, a jelvényeket és a havi összegzést. A körte veled ünnepel minden győzelmet.",tNext:"Tovább",tSkip:"Kihagyás",tDone:"Vágjunk bele!",menuGuide:"Útmutató"},
  bg:{tT1:"Запознай се с Кулпио",tB1:"Твоят помощник за хладилника: следи какво имаш, хаби по-малко и спестявай. Крушата винаги показва как се чувства хладилникът.",tT2:"Добавяй храна",tB2:"Ръчно, постави цял списък или сканирай с камерата. Няма срок? Кулпио ще го прецени.",tT3:"Следи свежестта",tB3:"Зеленото е свежо, червеното — изяж скоро. Лентата за предстоящата седмица показва какво кога изтича — докосни ден за филтър.",tT4:"Затвори кръга",tB4:"Изяде нещо? Докосни Използвано. Замразено спира часовника, Изхвърлено брои загубата, а За купуване планира следващото пазаруване — с приблизителна цена.",tT5:"Спестявай и печели",tB5:"Спестявания показва спестените и застрашените пари. Профилът пази серията, значките и месечното резюме. Крушата празнува всяка победа с теб.",tNext:"Напред",tSkip:"Пропусни",tDone:"Да започваме!",menuGuide:"Наръчник"},
  sr:{tT1:"Upoznaj Kulpio",tB1:"Tvoj pomoćnik za frižider: prati šta imaš, baci manje i uštedi. Kruška uvek pokazuje kako je frižideru.",tT2:"Dodaj hranu",tB2:"Ručno, nalepi celu listu ili skeniraj kamerom. Nema roka? Kulpio ga proceni za tebe.",tT3:"Prati svežinu",tB3:"Zeleno je sveže, crveno pojedi uskoro. Traka narednih 7 dana pokazuje šta kad ističe — dodirni dan za filter.",tT4:"Zatvori krug",tB4:"Pojeo si nešto? Dodirni Iskorišćeno. Zamrznuto zaustavlja sat, Bačeno broji gubitak, a Za kupovinu planira sledeći odlazak u prodavnicu — s procenom cene.",tT5:"Štedi i pobeđuj",tB5:"Ušteda prikazuje sačuvan i ugrožen novac. Profil vodi niz, bedževe i mesečni pregled. Kruška slavi svaku pobedu s tobom.",tNext:"Dalje",tSkip:"Preskoči",tDone:"Krećemo!",menuGuide:"Vodič"},
  hr:{tT1:"Upoznaj Kulpio",tB1:"Tvoj pomoćnik za hladnjak: prati što imaš, baci manje i uštedi. Kruška uvijek pokazuje kako je hladnjaku.",tT2:"Dodaj hranu",tB2:"Ručno, zalijepi cijeli popis ili skeniraj kamerom. Nema roka? Kulpio ga procijeni za tebe.",tT3:"Prati svježinu",tB3:"Zeleno je svježe, crveno pojedi uskoro. Traka sljedećih 7 dana pokazuje što kad istječe — dodirni dan za filtar.",tT4:"Zatvori krug",tB4:"Pojeo si nešto? Dodirni Iskorišteno. Zamrznuto zaustavlja sat, Bačeno broji gubitak, a Za kupnju planira sljedeći odlazak u dućan — s procjenom cijene.",tT5:"Štedi i pobjeđuj",tB5:"Ušteda prikazuje sačuvan i ugrožen novac. Profil vodi niz, značke i mjesečni pregled. Kruška slavi svaku pobjedu s tobom.",tNext:"Dalje",tSkip:"Preskoči",tDone:"Krećemo!",menuGuide:"Vodič"},
  el:{tT1:"Γνώρισε το Kulpio",tB1:"Ο βοηθός του ψυγείου σου: παρακολούθησε τι έχεις, σπατάλα λιγότερο και εξοικονόμησε. Το αχλάδι δείχνει πάντα πώς νιώθει το ψυγείο.",tT2:"Πρόσθεσε φαγητό",tB2:"Με το χέρι, επικόλλησε ολόκληρη λίστα ή σκάναρε με την κάμερα. Χωρίς ημερομηνία; Το Kulpio την εκτιμά για σένα.",tT3:"Πρόσεχε τη φρεσκάδα",tB3:"Πράσινο σημαίνει φρέσκο, κόκκινο φάε το σύντομα. Η επόμενη εβδομάδα δείχνει τι λήγει πότε — πάτα μια μέρα για φίλτρο.",tT4:"Κλείσε τον κύκλο",tB4:"Έφαγες κάτι; Πάτα Χρησιμοποιήθηκε. Το Κατεψυγμένο παγώνει τον χρόνο, το Σπαταλήθηκε μετρά την απώλεια και το Για αγορά σχεδιάζει τα επόμενα ψώνια — με εκτίμηση κόστους.",tT5:"Εξοικονόμησε και κέρδισε",tB5:"Η Εξοικονόμηση δείχνει χρήματα που έσωσες και σε κίνδυνο. Το προφίλ κρατά σερί, παράσημα και μηνιαία σύνοψη. Το αχλάδι γιορτάζει κάθε νίκη μαζί σου.",tNext:"Επόμενο",tSkip:"Παράλειψη",tDone:"Πάμε!",menuGuide:"Οδηγός"},
  he:{tT1:"הכירו את קולפיו",tB1:"העוזר של המקרר: עקבו אחרי מה שיש, בזבזו פחות וחסכו כסף. האגס תמיד מראה איך מרגיש המקרר.",tT2:"הוסיפו אוכל",tB2:"ביד, הדביקו רשימה שלמה או סרקו במצלמה. אין תאריך? קולפיו יעריך בשבילכם.",tT3:"שימו לב לטריות",tB3:"ירוק טרי, אדום לאכול בקרוב. פס השבוע הקרוב מראה מה פג ומתי — הקישו על יום לסינון.",tT4:"סגרו את המעגל",tB4:"אכלתם משהו? הקישו על נוצל. הוקפא עוצר את השעון, בוזבז סופר את ההפסד, ולקנות מתכנן את הקנייה הבאה — עם הערכת מחיר.",tT5:"חסכו ונצחו",tB5:"חיסכון מציג כסף שנחסך וכסף בסיכון. הפרופיל שומר רצף, תגים וסיכום חודשי. האגס חוגג איתכם כל ניצחון.",tNext:"הבא",tSkip:"דלגו",tDone:"קדימה!",menuGuide:"מדריך"},
  th:{tT1:"พบกับ Kulpio",tB1:"ผู้ช่วยตู้เย็นของคุณ: รู้ว่ามีอะไร ทิ้งให้น้อยลง และประหยัดเงิน ลูกแพร์จะบอกเสมอว่าตู้เย็นรู้สึกอย่างไร",tT2:"เพิ่มอาหาร",tB2:"เพิ่มเอง วางทั้งรายการ หรือสแกนด้วยกล้อง ไม่มีวันหมดอายุ? Kulpio ประเมินให้",tT3:"ดูความสด",tB3:"เขียวคือสด แดงคือรีบกิน แถบสัปดาห์ข้างหน้าบอกว่าอะไรหมดอายุวันไหน — แตะวันเพื่อกรอง",tT4:"ปิดวงจร",tB4:"กินแล้ว? แตะใช้แล้ว แช่แข็งหยุดเวลา ทิ้งแล้วนับความสูญเสีย และรายการซื้อวางแผนรอบหน้า — พร้อมราคาโดยประมาณ",tT5:"ประหยัดและชนะ",tB5:"แท็บประหยัดแสดงเงินที่เก็บได้และที่เสี่ยง โปรไฟล์เก็บสถิติ เหรียญ และสรุปประจำเดือน ลูกแพร์ฉลองทุกชัยชนะกับคุณ",tNext:"ถัดไป",tSkip:"ข้าม",tDone:"ลุยเลย!",menuGuide:"คู่มือ"},
  id:{tT1:"Kenalan dengan Kulpio",tB1:"Asisten kulkasmu: pantau isi kulkas, kurangi mubazir, dan hemat uang. Si pir selalu menunjukkan kondisi kulkasmu.",tT2:"Tambahkan makanan",tB2:"Secara manual, tempel seluruh daftar, atau pindai dengan kamera. Tak ada tanggal? Kulpio memperkirakannya untukmu.",tT3:"Pantau kesegaran",tB3:"Hijau berarti segar, merah berarti segera makan. Strip seminggu ke depan menunjukkan apa kedaluwarsa kapan — ketuk satu hari untuk memfilter.",tT4:"Tutup siklusnya",tB4:"Sudah makan sesuatu? Ketuk Dipakai. Dibekukan menghentikan waktu, Terbuang menghitung kerugian, dan Beli merencanakan belanja berikutnya — dengan perkiraan harga.",tT5:"Hemat dan menang",tB5:"Hemat menampilkan uang yang diselamatkan dan yang terancam. Profil mencatat rentetan, lencana, dan rekap bulanan. Si pir merayakan tiap kemenangan bersamamu.",tNext:"Berikutnya",tSkip:"Lewati",tDone:"Ayo mulai!",menuGuide:"Panduan"},
  ms:{tT1:"Kenali Kulpio",tB1:"Pembantu peti sejuk anda: jejak apa yang ada, kurangkan pembaziran dan jimat wang. Si pear sentiasa menunjukkan keadaan peti sejuk.",tT2:"Tambah makanan",tB2:"Secara manual, tampal senarai penuh atau imbas dengan kamera. Tiada tarikh? Kulpio akan anggarkan.",tT3:"Perhatikan kesegaran",tB3:"Hijau bermaksud segar, merah makan segera. Jalur seminggu akan datang menunjukkan apa luput bila — ketik satu hari untuk menapis.",tT4:"Lengkapkan kitaran",tB4:"Dah makan sesuatu? Ketik Digunakan. Dibekukan menghentikan masa, Dibazirkan mengira kerugian, dan Beli merancang trip seterusnya — dengan anggaran harga.",tT5:"Jimat dan menang",tB5:"Jimat memaparkan wang yang diselamatkan dan yang berisiko. Profil menyimpan rentetan, lencana dan ringkasan bulanan. Si pear meraikan setiap kejayaan bersama anda.",tNext:"Seterusnya",tSkip:"Langkau",tDone:"Jom mula!",menuGuide:"Panduan"},
  vi:{tT1:"Gặp gỡ Kulpio",tB1:"Trợ thủ tủ lạnh của bạn: nắm rõ đồ ăn, bớt lãng phí và tiết kiệm tiền. Quả lê luôn cho biết tủ lạnh đang thế nào.",tT2:"Thêm thực phẩm",tB2:"Thêm thủ công, dán cả danh sách hoặc quét bằng camera. Không có hạn dùng? Kulpio sẽ ước tính giúp bạn.",tT3:"Theo dõi độ tươi",tB3:"Xanh là tươi, đỏ là ăn sớm. Dải tuần tới cho biết món nào hết hạn ngày nào — chạm vào một ngày để lọc.",tT4:"Khép kín vòng tròn",tB4:"Ăn gì rồi? Chạm Đã dùng. Đã đông lạnh dừng đồng hồ, Lãng phí tính phần mất, còn Cần mua lên kế hoạch cho lần đi chợ tới — kèm giá ước tính.",tT5:"Tiết kiệm và chiến thắng",tB5:"Mục Tiết kiệm cho thấy tiền đã giữ được và tiền đang gặp nguy. Hồ sơ lưu chuỗi ngày, huy hiệu và tổng kết tháng. Quả lê ăn mừng mọi chiến thắng cùng bạn.",tNext:"Tiếp",tSkip:"Bỏ qua",tDone:"Bắt đầu nào!",menuGuide:"Hướng dẫn"},
};

// Parse JSON from localStorage defensively: a corrupt/truncated value (an
// interrupted write, manual tampering, quota eviction) must never throw at
// load time and take the whole app down with it.
function safeParse(raw, fallback) {
  try { const v = JSON.parse(raw); return v == null ? fallback : v; }
  catch { return fallback; }
}

// Aggregate the event log into per-month used/wasted stats for the Savings
// tab, current month first. Months with no activity at the old end are
// trimmed so a fresh install shows no empty chart.
function monthlyHistory(months = 6) {
  const out = [];
  const now = new Date();
  for (let m = 0; m < months; m++) {
    const d = new Date(now.getFullYear(), now.getMonth() - m, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    const ev = (state.history || []).filter(e => (e.t || '').startsWith(key));

// ─── LIVE FRESHNESS ──────────────────────────────────────────────

    p.cls = days <= 1 ? 'br' : days <= 5 ? 'ba' : 'bg';

// Day/night sky behind the pear, from the current hour.
function applySky() {
  const sky = document.getElementById('pearSky');
  if (!sky) return;
  const h = new Date().getHours();
  const mo = new Date().getMonth();
  // Four phases: night → dawn → day → dusk, each with its own sky colour.
  const phase = (h < 5 || h >= 21) ? 'night' : h < 8 ? 'dawn' : h < 18 ? 'day' : 'dusk';
  sky.className = 'pear-sky ' + phase;
  // Night means nightwear: the day hat comes off and the nightcap goes on.
  const pear = document.getElementById('pearIcon');
  if (pear) pear.classList.toggle('nightwear', phase === 'night');
  let html = '<span class="orb"></span>';
  if (phase === 'night') {
    const stars = [[20, 8], [42, 3], [8, 28], [128, 6], [146, 20], [104, 2], [64, 14]];
    html += stars.map(([x, y], i) => `<span class="star" style="left:${x}px;top:${y}px;animation-delay:${(i * 0.3).toFixed(1)}s"></span>`).join('');
    if (mo >= 5 && mo <= 7) {   // summer-night fireflies
      for (let i = 0; i < 6; i++) html += `<span class="firefly" style="left:${i * 24 + 14}px;top:${30 + (i * 13) % 40}px;animation-delay:${(i * 0.4).toFixed(1)}s"></span>`;
    }
  }
  if (mo === 11 || mo === 0 || mo === 1) {   // winter: gentle snow, day or night
    for (let i = 0; i < 9; i++) {
      html += `<span class="snow" style="left:${i * 17 + 6}px;animation-delay:${(i * 0.5).toFixed(1)}s;animation-duration:${(3.5 + Math.random() * 2).toFixed(1)}s"></span>`;
    }
  } else if (mo >= 8 && mo <= 10) {           // autumn: drifting leaves
    for (let i = 0; i < 7; i++) {
      html += `<span class="leaf" style="left:${i * 20 + 8}px;animation-delay:${(i * 0.6).toFixed(1)}s;animation-duration:${(4 + Math.random() * 2.5).toFixed(1)}s">🍂</span>`;
    }
  }
  sky.innerHTML = html;
}

// ─── RENDER ──────────────────────────────────────────────────────
function render(lang) {
  const t = T[lang] || T.en;
  const isRTL = lang === 'ar' || lang === 'he';

  // Language selector sync
  const sel = document.getElementById('langSelect');
  if (sel) sel.value = lang;

  // Currency selector sync
  const curSel = document.getElementById('currencySelect');
  if (curSel) curSel.value = currentCurrency;

  // Tagline
  document.getElementById('tagline').textContent = t.tagline;

  // RTL — set the dir attribute (not just CSS direction) so [dir=rtl] style
  // overrides can mirror the slide-in panels for Arabic/Hebrew.
  const dir = isRTL ? 'rtl' : 'ltr';
  document.getElementById('phone').style.direction = dir;
  document.getElementById('phone').setAttribute('dir', dir);
  document.body.setAttribute('dir', dir);

  // Localize the native date picker (format + calendar popup) to the
  // selected language. The <input type="date"> follows the element's
  // lang attribute, so set it to the BCP-47 tag for this language.
  const bcp = speechLang[lang] || lang;
  document.documentElement.setAttribute('lang', bcp);
  const pDate = document.getElementById('pDate');
  if (pDate) pDate.setAttribute('lang', bcp);

  // Food-loop buttons: record what happens to food (used / froze / to buy).
  const sc = document.getElementById('shortcuts');
  sc.innerHTML = '';
  [['✅', l('cUsed'), 'used'], ['❄️', l('cFroze'), 'freeze'], ['🗑️', l('cWasted'), 'waste'], ['🛒', l('cBuy'), 'shop']]
    .forEach(([icon, label, kind]) => {
      const btn = document.createElement('button');
      btn.className = 'sc';
      const lbl = document.createElement('span');
      lbl.className = 'sc-l';
      lbl.textContent = label;
      btn.textContent = icon;
      btn.appendChild(lbl);
      btn.title = label;
      btn.setAttribute('aria-label', label);
      btn.onclick = () => openSheet(kind);
      sc.appendChild(btn);
    });

  // Floating add buttons carry their labels as tooltips/aria only.
  const fabAdd = document.getElementById('fabAdd'), fabList = document.getElementById('fabList');
  if (fabAdd) { fabAdd.title = l('addManually'); fabAdd.setAttribute('aria-label', l('addManually')); }
  if (fabList) { fabList.title = l('multiAdd'); fabList.setAttribute('aria-label', l('multiAdd')); }

  // Nav tabs (use nav[0..3] from T)
  const navKeys = ['home','recipes','deals','profile'];
  const tNav = t.nav || T.en.nav;
  navKeys.forEach((k, i) => {
    const node = document.getElementById('nav-' + k);

// Preset fruit accents; the last swatch is a custom colour picker.
const ACCENTS = [
  ['#8BC34A', 'Pear'], ['#5BB8F5', 'Blueberry'], ['#9B6DEF', 'Grape'],
  ['#EC407A', 'Berry'], ['#EF5350', 'Tomato'], ['#FB8C00', 'Carrot'], ['#F6C324', 'Lemon'],
];
function hexToRgb(h) {
  h = h.replace('#', '');
  if (h.length === 3) h = h.split('').map(c => c + c).join('');
  return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
}
function relLum([r, g, b]) {
  const a = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
  return 0.2126 * a[0] + 0.7152 * a[1] + 0.0722 * a[2];
}
function darken([r, g, b], f) { return [r, g, b].map(v => Math.round(v * (1 - f))); }
function mixRgb(rgb, target, f) { return rgb.map((v, i) => Math.round(v + (target[i] - v) * f)); }
// Recolour the whole app from a single accent hex. Inline vars on #phone win
// over the .dark/.light class tokens, so this rides on top of either mode.
// The accent is nudged toward visibility for the ACTIVE mode: a near-black
// custom accent would otherwise vanish in dark mode (near-white in light),
// leaving invisible buttons and borders after a theme switch.
function setBrandVars(hex) {
  let rgb = hexToRgb(hex);
  if (rgb.some(isNaN)) rgb = hexToRgb('#8BC34A');
  if (currentTheme === 'light') { while (relLum(rgb) > 0.70) rgb = mixRgb(rgb, [0, 0, 0], 0.12); }
  // In dark mode the accent doubles as the "on/active" fill for toggles and the
  // theme segment; too dark an accent makes an ON switch read as OFF. Lift it to
  // a floor that stays clearly visible over the dark surface (0.14 sits below
  // every preset, so only near-black custom picks are nudged).
  else { while (relLum(rgb) < 0.14) rgb = mixRgb(rgb, [255, 255, 255], 0.12); }
  const eff = '#' + rgb.map(v => v.toString(16).padStart(2, '0')).join('');
  const p = document.getElementById('phone');
  p.style.setProperty('--brand', eff);
  p.style.setProperty('--brand-2', `rgb(${darken(rgb, 0.15).join(',')})`);
  // Text on brand: whichever of dark/white actually contrasts more (WCAG ratio).
  const lum = relLum(rgb);
  const darkInk = relLum(hexToRgb('#10240F'));
  const onBrand = (lum + 0.05) / (darkInk + 0.05) >= (1.05) / (lum + 0.05) ? '#10240F' : '#ffffff';
  p.style.setProperty('--on-brand', onBrand);
  p.style.setProperty('--border', `rgba(${rgb.join(',')},0.20)`);
  p.style.setProperty('--border-strong', `rgba(${rgb.join(',')},0.40)`);
}
function markAccentActive(hex) {
  document.querySelectorAll('#accentSwatches .swatch').forEach(s =>
    s.classList.toggle('active', !moodTheme && (s.dataset.accent || '').toLowerCase() === (hex || '').toLowerCase()));

// Downscale the chosen photo (a phone shot can be several MB) before storing,
// stepping smaller if it won't fit in localStorage.
function loadPhotoBackground(file) {
  const fr = new FileReader();
  fr.onload = ev => {
    const img = new Image();
    img.onload = () => storeScaledPhoto(img);
    img.onerror = () => alert(l('photoTooBig'));
    img.src = ev.target.result;
  };
  fr.readAsDataURL(file);
}
function storeScaledPhoto(img) {
  for (const [max, q] of [[1280, 0.72], [960, 0.66], [720, 0.6]]) {
    const s = Math.min(1, max / Math.max(img.naturalWidth, img.naturalHeight));
    const w = Math.round(img.naturalWidth * s), h = Math.round(img.naturalHeight * s);
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    c.getContext('2d').drawImage(img, 0, 0, w, h);
    let data;
    try { data = c.toDataURL('image/jpeg', q); } catch (_) { break; }
    try {
      localStorage.setItem('kulpio-bg-photo', data);
      currentPhoto = data;
      applyBackground('photo');
      refreshPhotoTile();
      return;
    } catch (err) { /* quota exceeded — retry smaller */ }
  }
  alert(l('photoTooBig'));
}

}

// ─── FOOD EMOJIS ─────────────────────────────────────────────────
// One emoji per canonical ingredient in FOOD_SYNONYMS, so a product only gets
// an icon when it CONFIDENTLY maps to a known food (via productToIngredients,
// which handles all 33 languages). Anything unrecognised shows no emoji at all
// — no generic fallback.
const FOOD_EMOJI = {
  milk:'🥛', egg:'🥚', cheese:'🧀', butter:'🧈', yogurt:'🥛', cream:'🥛',
  bread:'🍞', chicken:'🍗', beef:'🥩', pork:'🍖', ham:'🍖', bacon:'🥓',
  sausage:'🌭', fish:'🐟', salmon:'🐟', tuna:'🐟', shrimp:'🦐', rice:'🍚',
  pasta:'🍝', potato:'🥔', tomato:'🍅', onion:'🧅', garlic:'🧄', carrot:'🥕',
  pepper:'🫑', mushroom:'🍄', spinach:'🥬', cucumber:'🥒', corn:'🌽',
  beans:'🫘', apple:'🍎', banana:'🍌', lemon:'🍋', flour:'🌾', sugar:'🍬',
  honey:'🍯', oil:'🫒', chocolate:'🍫', salt:'🧂', water:'💧',
  orange:'🍊', grape:'🍇', strawberry:'🍓', blueberry:'🫐', watermelon:'🍉',
  pineapple:'🍍', peach:'🍑', pear:'🍐', cherry:'🍒', avocado:'🥑', mango:'🥭',
  kiwi:'🥝', coconut:'🥥', lettuce:'🥬', broccoli:'🥦', cabbage:'🥬',
  eggplant:'🍆', zucchini:'🥒', peas:'🫛', ginger:'🫚', chili:'🌶️',
  peanut:'🥜', olive:'🫒', turkey:'🦃', coffee:'☕', tea:'🍵', juice:'🧃',
  wine:'🍷', beer:'🍺',
};
function foodEmoji(name) {
  for (const ing of productToIngredients(name)) if (FOOD_EMOJI[ing]) return FOOD_EMOJI[ing];
  return '';   // unknown product → no icon
}

// ─── PRODUCT PHOTOS (Open Food Facts) ────────────────────────────
// A pack shot makes "Casuta Mea unt" instantly recognisable on the card.
// Photos come from Open Food Facts — a community food database with an
// open, CORS-enabled API (store sites like Linella can't be scraped from a
// browser app). Barcode scans take the scanned product's own photo; typed
// names are searched by text. Results are cached per name ('' = already
// searched, nothing found) so each product costs at most one request.
const _imgCache = safeParse(localStorage.getItem('kulpio-img'), {});
function _imgSave() {
  try {
    const keys = Object.keys(_imgCache);
    if (keys.length > 300) for (const k of keys.slice(0, keys.length - 300)) delete _imgCache[k];
    localStorage.setItem('kulpio-img', JSON.stringify(_imgCache));
  } catch {}
}
async function fetchProductImage(name, brand) {
  const prodKey = String(name || '').trim().toLowerCase();
  if (!prodKey || !navigator.onLine) return;
  // Query chain, most→least specific. The English ingredient translation
  // matters a lot: the database is indexed in English/Romanian, so
  // "casuta mea масло" finds nothing while "casuta mea butter" does.
  const b = String(brand || '').trim().toLowerCase();
  const en = (productToIngredients(name)[0] || '');
  const queries = [...new Set([
    b && `${b} ${prodKey}`,
    b && en && en !== prodKey && `${b} ${en}`,
    prodKey,
  ].filter(Boolean))];
  for (const q of queries) {
    let url;
    if (q in _imgCache) {
      url = _imgCache[q];
    } else {
      const data = await fetchJSON('https://world.openfoodfacts.org/cgi/search.pl?search_terms='
        + encodeURIComponent(q) + '&search_simple=1&action=process&json=1&page_size=3&fields=image_front_small_url', 9000);
      if (!data) return;   // network failure → try again another time, don't cache
      // First hit isn't always photographed — take the first result that is.
      url = ((data.products || []).find(p => p.image_front_small_url) || {}).image_front_small_url || '';
      _imgCache[q] = url;
      _imgSave();
    }
    if (url) { applyProductImage(prodKey, url); return; }
  }
  // The database has nothing — search the actual web through the AI proxy
  // (server-side, so no CORS). Finds shop/marketplace photos of exactly
  // this product ("casuta mea unt" → the real pack from a store listing).
  const proxy = aiProxyUrl();
  if (!proxy) return;
  const wq = queries[0];
  const wk = 'web:' + wq;
  let url = _imgCache[wk];
  if (url === undefined) {
    const r = await postJSON(proxy, { imageSearch: wq }, 15000);
    if (!r) return;
    url = String(r.url || '');
    _imgCache[wk] = url;
    _imgSave();
  }
  if (url) applyProductImage(prodKey, url);
}
// The user's OWN photo of the item — the most "real" picture possible, and
// the only guaranteed one for local products no database knows. Scaled to a
// small square JPEG data-URI so a whole fridge of photos stays well inside
// the localStorage quota (~10 KB each).
function fileToThumb(file, size = 112, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      try {
        const s = Math.min(img.width, img.height);
        const c = document.createElement('canvas');
        c.width = c.height = size;
        c.getContext('2d').drawImage(img, (img.width - s) / 2, (img.height - s) / 2, s, s, 0, 0, size, size);
        resolve(c.toDataURL('image/jpeg', quality));
      } catch (e) { reject(e); }
      finally { URL.revokeObjectURL(url); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('bad image')); };
    img.src = url;
  });
}
async function onProductPhoto(input) {
  if (!input.files || !input.files[0]) return;
  try {
    document.getElementById('productModal').dataset.img = await fileToThumb(input.files[0]);
    updatePhotoPreview();
  } catch {}
  input.value = '';
}

  const btn = document.getElementById('pPhotoBtn');

function productCard(pr, idx) {
  const sub = [];
  if (pr.brand) sub.push(`<b style="font-weight:600">${esc(pr.brand)}</b>`);
  if (pr.store) sub.push(esc(pr.store));
  if (pr.price > 0) {
    // ▲/▼ when the last re-buy cost more/less than the time before.
    const prev = parseFloat(pr.prevPrice) || 0, cur = parseFloat(pr.price) || 0;
    // With two recorded points the marker becomes a button opening the chart.
    const chart = ((pr.pHist || []).filter(h => h && h.v > 0).length >= 2);
    const trend = prev > 0 && prev !== cur
      ? (chart
        ? ` <button class="ptrend ${cur > prev ? 'up' : 'dn'}" onclick="event.stopPropagation();openPriceHist(${idx})" title="${esc(l('pHistTitle'))}" aria-label="${esc(l('pHistTitle'))}: ${esc(pr.name)}">${cur > prev ? '▲' : '▼'}</button>`
        : ` <span class="ptrend ${cur > prev ? 'up' : 'dn'}" title="${esc(l('priceWas'))} ${esc(formatPrice(prev))}">${cur > prev ? '▲' : '▼'}</span>`)
      : '';
    sub.push(`<b style="color:var(--brand);font-weight:600">${esc(formatPrice(pr.price))}</b>${trend}`);
  }
  const emoji = foodEmoji(pr.name);
  return `<div class="swipe-wrap">
    <div class="swipe-bg" aria-hidden="true"><span>✅</span><span>🗑️</span></div>
    <div class="prod-item${_flashNames.has((pr.name || '').trim().toLowerCase()) ? ' flash' : ''}" data-idx="${idx}" role="button" tabindex="0" aria-label="${esc(pr.name)} — ${esc(pr.badge)}. ${esc(l('editProduct'))}" onclick="editProductPrompt(${idx})">
      <div class="pd ${pr.dot}"></div>
      ${pr.img
        ? `<img class="pimg" src="${esc(pr.img)}" alt="" loading="lazy" onerror="this.remove()">`
        : emoji ? `<span class="pemoji" aria-hidden="true">${emoji}</span>` : ''}
      <div style="flex:1"><div class="pname">${esc(pr.name)}${(pr.qty || 1) > 1 ? ` <span class="pqty">×${pr.qty}</span>` : ''}</div><div class="pstore">${sub.join(' · ')}</div></div>
      <span class="pbadge ${pr.cls}">${esc(pr.badge)}</span>
      <button class="prod-del" onclick="event.stopPropagation();removeProduct(${idx})" aria-label="${esc(l('deleteItem'))}: ${esc(pr.name)}" title="${esc(l('deleteItem'))}">×</button>
    </div>
  </div>`;
}

// Compact grid tile: photo or big emoji, name, freshness badge. Tap opens
// the editor; swipe actions stay in the list view.
function productCardGrid(pr, idx) {
  const emoji = foodEmoji(pr.name);
  const art = pr.img
    ? `<img class="pgimg" src="${esc(pr.img)}" alt="" loading="lazy" onerror="this.remove()">`
    : `<span class="pgemoji" aria-hidden="true">${emoji || '·'}</span>`;
  return `<div class="pgrid-item" role="button" tabindex="0" aria-label="${esc(pr.name)} — ${esc(pr.badge)}. ${esc(l('editProduct'))}" onclick="editProductPrompt(${idx})">

// ── PRICE HISTORY (sparkline) ────────────────────────────────────
// Every observed price change (re-buy merge, manual price edit) appends to a
// small per-product trail; the ▲/▼ marker opens it as a chart once there are
// two points to draw.
function pushPriceHist(p, v) {
  v = parseFloat(v) || 0;
  if (v <= 0) return;
  p.pHist = p.pHist || [];
  const last = p.pHist[p.pHist.length - 1];
  if (last && last.v === v) return;        // unchanged price → no new point
  p.pHist.push({ d: daysToDateInput(0), v });
  if (p.pHist.length > 12) p.pHist = p.pHist.slice(-12);
}
function priceSparkSvg(hist) {
  const vs = hist.map(h => h.v);
  const min = Math.min(...vs), max = Math.max(...vs);
  const W = 280, H = 72, P = 8;
  const x = i => P + i * (W - 2 * P) / (hist.length - 1);
  const y = v => max === min ? H / 2 : P + (max - v) * (H - 2 * P) / (max - min);
  const pts = hist.map((h, i) => `${x(i).toFixed(1)},${y(h.v).toFixed(1)}`).join(' ');
  // One series, identity color; the delta chip (icon + amount) carries
  // the cheaper/pricier judgement, so the line never signals color-alone.
  return `<svg class="price-spark" viewBox="0 0 ${W} ${H}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${hist.map((h, i) => `<circle cx="${x(i).toFixed(1)}" cy="${y(h.v).toFixed(1)}" r="3.5" fill="var(--brand)"><title>${esc(formatPrice(h.v))}</title></circle>`).join('')}
  </svg>`;
}
function openPriceHist(idx) {
  const p = state.products[idx];
  const hist = p && (p.pHist || []).filter(h => h && h.v > 0);
  if (!hist || hist.length < 2) return;
  const df = new Intl.DateTimeFormat(speechLang[currentLang] || currentLang, { day: 'numeric', month: 'short' });
  const rows = hist.slice().reverse().map(h =>
    `<div class="price-row"><span>${esc(df.format(new Date(h.d + 'T12:00:00')))}</span><b>${esc(formatPrice(h.v))}</b></div>`).join('');
  const d = hist[hist.length - 1].v - hist[0].v;
  const delta = d ? `<div class="price-delta ${d > 0 ? 'up' : 'dn'}">${d > 0 ? '▲' : '▼'} ${esc(formatPrice(Math.abs(d)))}</div>` : '';
  document.getElementById('priceKicker').textContent = l('pHistTitle');
  document.getElementById('priceTitle').textContent = `${foodEmoji(p.name) || '🏷️'} ${p.name}`;
  document.getElementById('priceBody').innerHTML = priceSparkSvg(hist) + delta + `<div class="price-rows">${rows}</div>`;
  ensureOverlayHistory();
  document.getElementById('priceModal').classList.add('show');
}

// Build a product from just a name, with an auto-estimated expiry.
function makeProduct(name, store = '', price = 0) {

}
// DEMO LIMIT: this version keeps the fridge small so the small set works
// perfectly. Raise (or delete the check below) when the full version ships.
const MAX_PRODUCTS = 10;
let _fullHit = false;   // set when an add bounced off the limit
// After an add flow: show the "fridge is full" notice once, if it was hit.
// Returns true when the notice fired (callers then skip the happy reaction).
function fridgeFullNotice() {
  if (!_fullHit) return false;
  _fullHit = false;
  pearReact('stuffed', null, '😮‍💨', 1400);   // he's stuffed — puffed cheeks, no room left
  pearSay('🧊 ' + l('fridgeFull').replace('{x}', MAX_PRODUCTS));

}
// Adding something already in the fridge refreshes that card (new expiry,
// plus price/store when given) instead of creating a duplicate.
// Returns true when a new card was added, false when an existing one merged,
// 'full' when the demo limit blocked it.
const _flashNames = new Set();   // refreshed cards pulse on the next render
function mergeOrPush(p) {
  const key = p.name.trim().toLowerCase();
  const ex = state.products.find(x => (x.name || '').trim().toLowerCase() === key);
  if (ex) {
    ex.exp = p.exp; ex.badge = p.badge; ex.cls = p.cls; ex.dot = p.dot;
    ex.qty = (ex.qty || 1) + (p.qty || 1);   // bought another one → count it
    if (p.price > 0) {
      const old = parseFloat(ex.price) || 0;
      if (old > 0 && old !== p.price) ex.prevPrice = old;   // re-bought at a new price → ▲/▼ trend
      if (old > 0 && !ex.pHist) pushPriceHist(ex, old);     // start the trail at the price we knew
      ex.price = p.price;
      pushPriceHist(ex, p.price);
    }
    if (p.store) ex.store = p.store;
    if (p.brand) ex.brand = p.brand;
    if (p.img) ex.img = p.img;
    delete ex.frozen;   // a re-bought item is fresh, not still in the freezer
    delete ex.opened;   // …and it's a sealed pack again
    _flashNames.add(key);
    return false;
  }
  if (state.products.length >= MAX_PRODUCTS) { _fullHit = true; return 'full'; }
  state.products.push(p);
  return true;
}

const CAT_OF = {};
[['catDairy', ['milk','egg','cheese','butter','yogurt','cream']],
 ['catMeat', ['chicken','beef','pork','ham','bacon','sausage','fish','salmon','tuna','shrimp','turkey']],

 ['catBakery', ['bread']],

].forEach(([cat, list]) => list.forEach(i => CAT_OF[i] = cat));

// A cell per day for the next 7 days (plus an Expired cell when needed)
// showing what runs out when; tapping a day narrows the list to it.
function weekDayKey(offset) {
  const d = new Date(Date.now() + offset * 86400000);
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function weekCellHtml(key, name, items, urg, today) {
  const emo = items.map(p => foodEmoji(p.name)).filter(Boolean).slice(0, 2).join('');
  const cls = ['wday', key === 'expired' ? 'w-exp' : '', items.length ? urg : 'empty', fridgeDay === key ? 'selected' : '', today ? 'today' : ''].filter(Boolean).join(' ');
  const aria = (today ? l('today') + ', ' : '') + name + ': ' + items.length;
  // A planned dinner (meal planner, Saved recipes) peeks out under the count.
  const meal = key !== 'expired' && mealPlan[key];
  return `<button type="button" class="${cls}" ${items.length ? `onclick="setFridgeDay('${key}')" aria-pressed="${fridgeDay === key}"` : 'disabled'} aria-label="${esc(aria)}${meal ? ' · 📅 ' + esc(meal.title) : ''}">
      <span class="wd-name">${esc(name)}</span>
      <span class="wd-food">${emo || (items.length ? '•' : '·')}</span>
      <span class="wd-count">${items.length || ''}</span>
      ${meal ? `<span class="wd-meal" title="${esc(meal.title)}">📅${meal.emoji || '🍽️'}</span>` : ''}
    </button>`;
}
function weekStripHtml() {
  const expired = state.products.filter(p => p.exp && (daysUntil(p.exp) ?? 1) < 0);
  const byDay = [];
  for (let o = 0; o < 7; o++) {
    const key = weekDayKey(o);
    byDay.push([key, state.products.filter(p => p.exp === key)]);
  }
  // Deselect a day that no longer has items (last one eaten/tossed/edited).
  if (fridgeDay && !(fridgeDay === 'expired' ? expired.length : (byDay.find(([k]) => k === fridgeDay) || [0, []])[1].length)) fridgeDay = null;
  // A fridge with nothing due this week doesn't need the calendar at all.
  if (!expired.length && byDay.every(([, its]) => !its.length)) return '';
  const wdFmt = new Intl.DateTimeFormat(speechLang[currentLang] || currentLang, { weekday: 'short' });
  const cells = expired.length ? [weekCellHtml('expired', l('expired'), expired, 'w-red', false)] : [];
  byDay.forEach(([key, its], o) => {
    // Weekday names for every cell — "today" spelled out overflows in many
    // languages; the first cell is marked as today by colour instead.
    const name = wdFmt.format(new Date(Date.now() + o * 86400000));
    cells.push(weekCellHtml(key, name, its, o <= 1 ? 'w-red' : o <= 5 ? 'w-amber' : '', o === 0));
  });
  // Collapsed by default: the calendar is a planning tool, not something you
  // need in your face every time you open the app. The summary line still
  // tells you how much is due, so folding it away costs no information.
  const due = expired.length + byDay.reduce((n, [, its]) => n + its.length, 0);
  return `<div class="week-strip">
    <button class="week-head" onclick="toggleWeek()" aria-expanded="${weekOpen}" aria-controls="weekDays">
      <span class="wk-t">📆 ${esc(l('weekAhead'))}</span>
      <span class="wk-n">${due}</span>
      <span class="wk-chev${weekOpen ? ' open' : ''}" aria-hidden="true">▾</span>
    </button>
    ${weekOpen ? `<div class="week-days" id="weekDays">${cells.join('')}</div>` : ''}
  </div>`;
}

      ${tools ? `<div class="fridge-tools">
        <div class="fridge-row">
          <input id="fridgeSearch" class="fridge-search" type="search" autocomplete="off" placeholder="${esc(l('searchFridge'))}" aria-label="${esc(l('searchFridge'))}" value="${esc(fridgeQuery)}" oninput="onFridgeSearch(this.value)">
          <button class="fchip active view-btn" id="viewBtn" onclick="toggleFridgeView()" aria-label="${esc(l(fridgeView === 'grid' ? 'listView' : 'gridView'))}" title="${esc(l(fridgeView === 'grid' ? 'listView' : 'gridView'))}">${fridgeView === 'grid' ? '☰' : '▦'}</button>
          <button class="fchip active filter-btn" id="filterBtn" onclick="toggleFilterMenu()" aria-haspopup="true" aria-controls="filterMenu">${esc(filterBtnLabel())}</button>
        </div>
        <div class="filter-menu" id="filterMenu">${filterMenuHtml()}</div>
      </div>` : ''}
      <div id="fridgeItems">${fridgeItemsHtml()}</div>`;
    }
    return;
  }

  // ── RECIPES TAB ──
  if (currentTab === 'recipes') {
    label.textContent = t.nav[1];
    // Saved view: works offline and with an empty fridge — the recipes carry
    // their own ingredients and instructions.
    if (recipesView === 'fav') {
      shownRecipes = favRecipes;
      list.innerHTML = recipeChipsHtml() + planStripHtml() + (favRecipes.length
        ? `<div class="panel-grid">${favRecipes.map((r, i) => recipeCard(r, i)).join('')}</div>`
        : `<div style="text-align:center;padding:36px 18px;font-size:13px;color:var(--muted);line-height:1.6">${esc(l('favEmpty'))}</div>`);
      return;
    }
    if (state.products.length === 0) {
      list.innerHTML = recipeChipsHtml() + recipeSearchRowHtml() + chefRowHtml() +`<div style="text-align:center;padding:40px 20px;opacity:0.5;font-size:13px">${esc(l('addForRecipes'))}</div>`;
      return;
    }
    const locals = buildLocalRecipes();
    shownRecipes = locals;
    // Show instant content (fridge ideas, or a spinner) while real recipes load.
    list.innerHTML = recipeChipsHtml() + recipeSearchRowHtml() + chefRowHtml() +`<div style="font-size:12px;color:var(--faint);margin-bottom:10px">${esc(l('searchRecipes'))}</div>
      ${locals.length
        ? `<div class="panel-grid">${locals.map((r, i) => recipeCard(r, i)).join('')}</div>`
        : `<div class="rd-loading">${esc(l('loadingRecipe'))}</div>`}`;

    try { await loadInternetRecipes(); } catch { internetRecipes = []; }
    if (currentTab !== 'recipes' || recipesView !== 'sugg') return;
    // A search or surprise result is on screen — don't stomp on it.
    const rs = document.getElementById('recipeSearch');
    if (rs && rs.value.trim()) return;

    // Prefer real recipes with photos; fall back to quick fridge ideas offline.
    shownRecipes = internetRecipes.length ? internetRecipes : buildLocalRecipes();
    if (shownRecipes.length) {
      const note = internetRecipes.length ? ''
        : `<div style="font-size:12px;color:var(--faint);margin-bottom:10px">${esc(l('searchRecipes'))}</div>`;
      list.innerHTML = recipeChipsHtml() + recipeSearchRowHtml() + chefRowHtml() +note + `<div class="panel-grid">${shownRecipes.map((r, i) => recipeCard(r, i)).join('')}</div>`;
      translateCardTitles();          // translate titles into the selected language
      localizeRecipeIngredients();    // …and the fridge-match / buy lists
    } else {
      // Never leave the tab blank — explain and offer a retry.
      list.innerHTML = recipeChipsHtml() + recipeSearchRowHtml() + chefRowHtml() +`<div style="text-align:center;padding:36px 18px;line-height:1.6">
        <div style="font-size:13px;color:var(--muted);margin-bottom:16px">${esc(l('noRecipesFound'))}</div>
        <button class="mini-btn" style="padding:11px 20px;font-size:14px" onclick="reloadRecipes()">↻ ${esc(l('retry'))}</button>
      </div>`;
    }
    return;
  }

  // ── SAVINGS TAB ──
  if (currentTab === 'deals') {
    label.textContent = l('savings');
    const products = state.products;

    // Store breakdown
    const storeCounts = {};
    products.forEach(p => {
      const s = (p.store || '?').trim();
      storeCounts[s] = (storeCounts[s] || 0) + 1;
    });
    const totalItems = products.length;
    const storeEntries = Object.entries(storeCounts).sort((a,b) => b[1]-a[1]);
    const storeHtml = storeEntries.length === 0
      ? `<div style="font-size:12px;opacity:.5;padding:12px 0">${esc(l('noStoreData'))}</div>`
      : storeEntries.map(([name, count]) => {
          const pct = Math.round(count / totalItems * 100);
          return `<div class="store-bar-row">
            <span style="min-width:80px;font-size:12px">${esc(name)}</span>
            <div class="store-bar-track"><div class="store-bar-fill" style="width:${pct}%"></div></div>
            <span class="store-bar-pct">${pct}%</span>
          </div>`;
        }).join('');

    const totalSpent = products.reduce((s, p) => s + (parseFloat(p.price) || 0) * (p.qty || 1), 0);
    const spentHtml = totalSpent > 0
      ? `<div class="profile-stat">
          <div>
            <div class="card-title">${esc(l('totalSpent'))}</div>
            <div class="card-sub">${products.length} ${esc(l('purchases'))}</div>
          </div>
          <div class="profile-value">${esc(formatPrice(totalSpent))}</div>
        </div>`
      : '';

    // Balance hero: one card answers "am I winning?" — net money kept by
    // eating in time, with the saved-vs-wasted split underneath.
    const savedV = state.saved || 0, wastedV = state.wasted || 0;
    const balTot = savedV + wastedV;
    const balNet = savedV - wastedV;
    const balHtml = balTot > 0 ? `<div class="action-card" style="display:block">
      <div class="card-title" style="margin-bottom:4px">⚖️ ${esc(l('balTitle'))}</div>
      <div class="bal-net ${balNet >= 0 ? 'pos' : 'neg'}">${balNet >= 0 ? '+' : '−'}${esc(formatPrice(Math.abs(balNet)))}</div>
      <div class="bal-bar"><div class="bal-fill" style="width:${Math.round(savedV / balTot * 100)}%"></div></div>
      <div class="bal-legend"><span>💚 ${esc(formatPrice(savedV))}</span><span>🗑️ ${esc(formatPrice(wastedV))}</span></div>
    </div>` : '';

    // Money at risk: the value of unfrozen items expiring within 2 days —
    // cash still rescuable by eating in time. Expired items are already
    // lost, so they don't count. Tapping jumps to the expiring list.
    const riskItems = products.filter(p => {
      if (!p.exp || p.frozen) return false;
      const d = daysUntil(p.exp);
      return d != null && d >= 0 && d <= 2;
    });
    const riskVal = riskItems.reduce((s, p) => s + (parseFloat(p.price) || 0) * (p.qty || 1), 0);
    const riskHtml = riskVal > 0 ? `<div class="profile-stat risk-card" role="button" tabindex="0" onclick="goRescue()" onkeydown="if(event.key==='Enter')goRescue()" aria-label="${esc(l('moneyAtRisk'))}: ${esc(formatPrice(riskVal))}">
      <div>
        <div class="card-title">⚠️ ${esc(l('moneyAtRisk'))}</div>
        <div class="card-sub">${riskItems.slice(0, 3).map(p => esc(p.name)).join(', ')}${riskItems.length > 3 ? ` +${riskItems.length - 3}` : ''}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
        <div class="profile-value" style="color:var(--danger)">${esc(formatPrice(riskVal))}</div>
        <span class="risk-go">⏰ ${esc(l('fExpiring'))} →</span>
      </div>
    </div>` : '';

    // Average price per item by store — the "which shop is actually
    // cheaper?" answer, from the priced items in the fridge right now.
    const storeAgg = {};
    products.forEach(p => {
      const s = (p.store || '').trim(), pr = parseFloat(p.price) || 0;
      if (!s || pr <= 0) return;
      (storeAgg[s] = storeAgg[s] || { sum: 0, n: 0 });
      storeAgg[s].sum += pr * (p.qty || 1);
      storeAgg[s].n += (p.qty || 1);
    });
    const avgRows = Object.entries(storeAgg).map(([s, a]) => [s, a.sum / a.n]).sort((a, b) => a[1] - b[1]);
    const maxAvg = avgRows.length ? avgRows[avgRows.length - 1][1] : 0;
    const avgHtml = avgRows.length >= 2 ? `<div class="action-card" style="display:block">
      <div class="card-title" style="margin-bottom:10px">🏷️ ${esc(l('avgPriceStore'))}</div>
      ${avgRows.map(([s, v], i) => `<div class="store-bar-row">
          <span style="min-width:80px;font-size:12px">${i === 0 ? '🏆 ' : ''}${esc(s)}</span>
          <div class="store-bar-track"><div class="store-bar-fill" style="width:${Math.max(8, Math.round(v / maxAvg * 100))}%"></div></div>
          <span class="store-bar-pct" style="width:auto">${esc(formatPrice(v))}</span>
        </div>`).join('')}
    </div>` : '';

    // Waste insights: which shelf and which item the waste comes from, and
    // how big a share of all handled food it is. Needs at least two wasted
    // events — one accident isn't a pattern.
    const wEv = (state.history || []).filter(e => e.k === 'wasted');
    let wasteInsHtml = '';
    if (wEv.length >= 2) {
      const byCat = {}, byItem = {};
      wEv.forEach(e => {
        const c = foodCategory({ name: e.name });
        byCat[c] = (byCat[c] || 0) + 1;
        const k = (e.name || '').trim().toLowerCase();
        if (k) (byItem[k] = byItem[k] || { name: e.name, n: 0 }).n++;
      });
      const topCat = Object.entries(byCat).sort((a, b) => b[1] - a[1])[0];
      const topItem = Object.values(byItem).sort((a, b) => b.n - a.n)[0];
      const usedN = (state.history || []).filter(e => e.k === 'used').length;
      const rate = Math.round(wEv.length / (wEv.length + usedN) * 100);
      wasteInsHtml = `<div class="action-card" style="display:block">
        <div class="card-title" style="margin-bottom:10px">🔍 ${esc(l('winsTitle'))}</div>
        <div class="recap-rows">
          <span>${CAT_EMOJI[topCat[0]]} ${esc(l('winsCat'))}: <b>${esc(l(topCat[0]))}</b> ×${topCat[1]}</span>
          ${topItem ? `<span>${foodEmoji(topItem.name) || '🗑️'} ${esc(l('winsItem'))}: <b>${esc(capitalize(topItem.name))}</b> ×${topItem.n}</span>` : ''}
          <span>📉 ${esc(l('winsRate'))}: <b>${rate}%</b></span>
        </div>
      </div>`;
    }

    // Eco impact — rough per-item averages (≈0.9 kg CO₂e and ≈250 L of
    // embedded water per food item not wasted), driven by usedCount.
    const eco = state.usedCount || 0;
    const co2 = eco * 0.9;
    const ecoHtml = eco > 0
      ? `<div class="profile-stat">
          <div>
            <div class="card-title">🌍 ${esc(l('co2Saved'))}</div>
            <div class="card-sub">${esc(l('ecoSub'))}</div>
          </div>
          <div class="profile-value" style="color:var(--ok)">${co2 < 10 ? co2.toFixed(1) : Math.round(co2)} kg</div>
        </div>
        <div class="profile-stat">
          <div>
            <div class="card-title">💧 ${esc(l('waterSaved'))}</div>
            <div class="card-sub">${esc(l('ecoSub'))}</div>
          </div>
          <div class="profile-value" style="color:var(--water)">${(eco * 250).toLocaleString()} L</div>
        </div>`
      : '';

    // Monthly trend: used vs wasted per month from the event log, so progress
    // ("less waste than last month") is visible instead of lifetime sums only.
    const hist = monthlyHistory();
    const maxCnt = Math.max(1, ...hist.map(h => Math.max(h.used, h.wasted)));
    // Month names only — a 6-month window can't repeat a month, and "Jul 26"
    // style year suffixes read awkwardly in several languages.
    const mFmt = new Intl.DateTimeFormat(speechLang[currentLang] || currentLang, { month: 'short' });
    const histHtml = !hist.length ? '' : `<div class="action-card" style="display:block">
      <div class="card-title" style="margin-bottom:10px">📅 ${esc(l('histMonths'))}</div>
      ${hist.map(h => `<div class="hist-row">
          <span class="hist-month">${esc(mFmt.format(h.date))}</span>
          <div class="hist-bars">
            <div class="hist-bar hb-used" style="width:${Math.round(h.used / maxCnt * 100)}%"></div>
            <div class="hist-bar hb-wasted" style="width:${Math.round(h.wasted / maxCnt * 100)}%"></div>
          </div>
          <span class="hist-nums">✅ ${h.used}${h.wasted ? ` · 🗑️ ${h.wasted}` : ''}${h.usedV > 0 ? `<br>💚 ${esc(formatPrice(h.usedV))}` : ''}</span>
        </div>`).join('')}
    </div>`;

    list.innerHTML = `<div class="panel-grid">
      ${riskHtml}
      ${balHtml}
      ${wasteInsHtml}
      ${histHtml}
      ${avgHtml}
      ${ecoHtml}
      ${spentHtml}
      <div class="action-card" style="display:block">
        <div class="card-title" style="margin-bottom:10px">🛒 ${esc(l('storeBreakdown'))}</div>
        <div class="store-bar-wrap">${storeHtml}</div>
      </div>
      ${actionCard('🗺️', l('nearbyStore'), l('nearbyStoreSub'), l('route'), 'route')}
    </div>`;
    return;
  }

  // ── PROFILE TAB ──
  label.textContent = t.nav[3];
  const products = state.products;
  // An emptied fridge is an achievement, not an empty profile — only true
  // fresh installs (no history, no badges either) get the placeholder.
  if (products.length === 0 && !(state.history || []).length && !Object.keys(state.badges || {}).length) {
    list.innerHTML = `<div style="text-align:center;padding:40px 20px;font-size:13px;line-height:1.6;color:var(--muted)">${esc(l('emptyProfile'))}</div>`;
    return;
  }

  // Level hero: XP from monotonic counters only (items used, badges), so a
  // level once earned is never lost. Level n → n+1 costs 100·n XP.
  const badgeN = BADGES.filter(b => state.badges && state.badges[b.id]).length;
  const xp = (state.usedCount || 0) * 12 + badgeN * 60;
  let lvl = 1;
  while (xp >= 50 * lvl * (lvl + 1)) lvl++;
  const lvlBase = 50 * (lvl - 1) * lvl, lvlNext = 50 * lvl * (lvl + 1);
  const lvlEmoji = lvl >= 10 ? '👑' : lvl >= 6 ? '✨' : lvl >= 3 ? '🍐' : '🌱';
  const lvlHtml = `<div class="action-card" style="display:block">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <div class="card-title">${lvlEmoji} ${esc(l('lvlTitle'))} ${lvl}</div>
      <span class="card-sub">${xp - lvlBase} / ${lvlNext - lvlBase} XP</span>
    </div>
    <div class="lvl-bar"><div class="lvl-fill" style="width:${Math.round((xp - lvlBase) / (lvlNext - lvlBase) * 100)}%"></div></div>
  </div>`;

  // Lifetime tiles: the whole journey in four numbers.
  const lifeUsedN = (state.history || []).filter(e => e.k === 'used').length;
  const lifeWastedN = (state.history || []).length - lifeUsedN;
  const lifeRate = lifeUsedN + lifeWastedN > 0 ? Math.round(lifeUsedN / (lifeUsedN + lifeWastedN) * 100) + '%' : '—';
  const lifeDays = Math.max(1, Math.floor((Date.now() - new Date(state.firstUse + 'T00:00:00').getTime()) / 864e5) + 1);
  const lifeHtml = `<div class="action-card" style="display:block">
    <div class="life-grid">
      <div class="life-tile"><b>${state.usedCount || 0}</b><span>✅ ${esc(l('recapEaten'))}</span></div>
      <div class="life-tile"><b>${lifeRate}</b><span>📉 ${esc(l('lifeRate'))}</span></div>
      <div class="life-tile"><b>${isNaN(lifeDays) ? 1 : lifeDays}</b><span>📅 ${esc(l('lifeDays'))}</span></div>
      <div class="life-tile"><b>${badgeN}/${BADGES.length}</b><span>🏆 ${esc(l('achTitle'))}</span></div>
    </div>
  </div>`;

  const fresh = products.filter(p => p.cls === 'bg').length;
  const warn = products.filter(p => p.cls === 'ba').length;
  const crit = products.filter(p => p.cls === 'br').length;
  const total = products.length;

  const storeCounts2 = {};
  products.forEach(p => { const s = (p.store||'?').trim(); storeCounts2[s] = (storeCounts2[s]||0)+1; });
  const topStore2 = Object.entries(storeCounts2).sort((a,b)=>b[1]-a[1])[0];

  // Freshness percentages for bar
  const freshPct = total > 0 ? Math.round(fresh/total*100) : 0;
  const warnPct = total > 0 ? Math.round(warn/total*100) : 0;
  const critPct = total > 0 ? Math.round(crit/total*100) : 0;

  // This-month recap from the event log — a shareable mini "wrapped".
  // Hidden until something has actually happened this month.
  const mEv = (state.history || []).filter(e => (e.t || '').startsWith(new Date().toISOString().slice(0, 7)));
  const mUsed = mEv.filter(e => e.k === 'used');
  const mSaved = mUsed.reduce((s, e) => s + (parseFloat(e.price) || 0), 0);
  const mCnt = {};
  mUsed.forEach(e => { const k = (e.name || '').trim(); if (k) mCnt[k] = (mCnt[k] || 0) + 1; });
  const mTop = Object.entries(mCnt).sort((a, b) => b[1] - a[1])[0];
  const mName = capitalize(new Intl.DateTimeFormat(speechLang[currentLang] || currentLang, { month: 'long' }).format(new Date()));
  const recapHtml = mEv.length ? `<div class="action-card" style="display:block">
    <div class="card-title" style="margin-bottom:10px">🗓️ ${esc(l('recapTitle'))} · ${esc(mName)}</div>
    <div class="recap-rows">
      <span>✅ ${mUsed.length} ${esc(l('recapEaten'))}</span>
      <span>🗑️ ${mEv.length - mUsed.length} ${esc(l('recapWasted'))}</span>
      ${mSaved > 0 ? `<span>💚 ${esc(formatPrice(mSaved))}</span>` : ''}
      ${mTop ? `<span>${foodEmoji(mTop[0]) || '⭐'} ${esc(l('recapTop'))}: ${esc(capitalize(mTop[0]))}${mTop[1] > 1 ? ' ×' + mTop[1] : ''}</span>` : ''}
    </div>
    <button class="mini-btn" style="margin-top:10px" onclick="shareRecap()">📤 ${esc(l('recapShare'))}</button>
  </div>` : '';

  list.innerHTML = `<div class="panel-grid">
    ${lvlHtml}
    <div class="profile-stat">
      <div>
        <div class="card-title">${esc(l('monthlySaved'))}</div>
        <div class="card-sub">${esc(l('foodSaved'))}: ${fresh} / ${total}</div>
      </div>
      <div class="profile-value">${total}</div>
    </div>
    <div class="profile-stat">
      <div>
        <div class="card-title">🔥 ${esc(l('wasteStreak'))}</div>
        <div class="card-sub">${esc(l('wasteStreakSub'))}${(state.bestStreak || 0) > wasteStreakDays() ? ` · 🏅 ${esc(l('recordLbl'))}: ${state.bestStreak}` : ''}</div>
      </div>
      <div class="profile-value" style="color:var(--ok)">${wasteStreakDays()}</div>
    </div>
    ${recapHtml}
    ${lifeHtml}
    ${(() => { const ts = products.reduce((s, p) => s + (parseFloat(p.price) || 0) * (p.qty || 1), 0); return ts > 0 ? `<div class="profile-stat">
      <div>
        <div class="card-title">${esc(l('totalSpent'))}</div>
        <div class="card-sub">${total} ${esc(l('purchases'))}</div>
      </div>
      <div class="profile-value">${esc(formatPrice(ts))}</div>
    </div>` : ''; })()}
    ${topStore2 ? `<div class="profile-stat">
      <div>
        <div class="card-title">${esc(l('topStore'))}</div>
        <div class="card-sub">${topStore2[1]} ${l('purchases')} · ${Math.round(topStore2[1]/total*100)}%</div>
      </div>
      <div class="profile-value" style="font-size:16px">${esc(topStore2[0])}</div>
    </div>` : ''}
    <div class="action-card" style="display:block">
      <div class="card-title" style="margin-bottom:10px">${esc(l('weeklySavings'))}</div>
      <div style="display:flex;gap:8px;align-items:center;font-size:11px;margin-top:6px">
        <div style="flex:1"><div style="height:8px;border-radius:4px;background:#4CAF50;width:${freshPct}%;min-width:4px;margin-bottom:4px"></div><span style="opacity:.6">🟢 ${fresh}</span></div>
        <div style="flex:1"><div style="height:8px;border-radius:4px;background:#FF9800;width:${warnPct}%;min-width:4px;margin-bottom:4px"></div><span style="opacity:.6">🟠 ${warn}</span></div>
        <div style="flex:1"><div style="height:8px;border-radius:4px;background:#F44336;width:${critPct}%;min-width:4px;margin-bottom:4px"></div><span style="opacity:.6">🔴 ${crit}</span></div>
      </div>
    </div>
    <div class="action-card" style="display:block">
      <div class="card-title" style="margin-bottom:10px">🏆 ${esc(l('achTitle'))} · ${BADGES.filter(b => state.badges && state.badges[b.id]).length}/${BADGES.length}</div>
      <div class="badge-grid">${BADGES.map(badgeHtml).join('')}</div>
    </div>
  </div>`;
}

function addBtnHtml() {
  return `<button class="add-manual-btn" onclick="addProductManually()">${esc(l('addManually'))}</button>
    <button class="add-manual-btn" style="opacity:.85;margin-top:6px" onclick="openMultiAdd()">📝 ${esc(l('multiAdd'))}</button>`;
}
// ── MULTI-ADD: paste a list, one item per line ───────────────────
function openMultiAdd() {
  const t = document.getElementById('multiText');
  if (t) t.value = '';
  ensureOverlayHistory();
  document.getElementById('multiModal').classList.add('show');
  setTimeout(() => t && t.focus(), 60);
}
function closeMultiModal() {
  document.getElementById('multiModal').classList.remove('show');
}
function saveMultiAdd() {
  const lines = (document.getElementById('multiText').value || '')
    .split('\n').map(s => s.trim()).filter(Boolean).slice(0, 100);
  closeMultiModal();
  if (!lines.length) return;
  lines.forEach(name => mergeOrPush(makeProduct(name)));
  recipeCacheKey = '';
  saveState();
  renderContent();
  lines.slice(0, 25).forEach(name => fetchProductImage(name));   // pack photos, politely capped
  if (fridgeFullNotice()) return;   // some lines bounced off the demo limit
  pearReact('hop', 'pearAdd', '😋', 700);
  if (lines.length >= 5) setTimeout(pearConfetti, 450);   // a real haul!
}

// ─── RECIPES HELPERS ─────────────────────────────────────────────
function cleanName(name) {
  return String(name || '').toLowerCase().replace(/\d+[a-zа-яA-ZА-Я]*/g,'').replace(/danone|x\d+/gi,'').trim();
}
function fridgeIngredients() {
  return state.products.map(p => cleanName(p.name)).filter(Boolean);
}

// ─── MULTILINGUAL FOOD DICTIONARY ───────────────────────────────
// Maps grocery words from many languages to their English ingredient so the
// recipe search (TheMealDB is English-only) works whatever language you add
// products in. english key → list of synonyms across languages.

// Rough БЖУ for a recipe: match each ingredient through the multilingual
// dictionary to the macro table and average the per-100g values — "what's in
// a typical 100 g of this dish". Free-form recipe measures ("a splash",
// "2 tins") can't be parsed reliably offline, so this is deliberately an
// average, upgraded to a real per-serving figure by the AI proxy when set.
function estimateRecipeNutrition(r) {
  const ings = (r.ingredients && r.ingredients.length)
    ? r.ingredients.map(i => (i.name || i).toString())
    : [...(r.used || []), ...(r.missing || [])];
  let n = 0, kcal = 0, p = 0, f = 0, c = 0;
  for (const name of ings) {
    for (const key of productToIngredients(name)) {
      const m = MACROS[key];
      if (m) { kcal += m[0]; p += m[1]; f += m[2]; c += m[3]; n++; break; }
    }
  }
  if (!n) return null;
  return { kcal: Math.round(kcal / n), protein: Math.round(p / n * 10) / 10,
           fat: Math.round(f / n * 10) / 10, carbs: Math.round(c / n * 10) / 10 };
}

// Translate a product name to its English ingredient(s). Falls back to the
// cleaned name when nothing is recognised (so plain English still works).
// Liquids/mediums a product is preserved IN — not separate fridge items.
const PRESERVING_MEDIUM = new Set(['oil','water','salt','sugar']);
function productToIngredients(name) {
  const cleaned = cleanName(name);
  if (!cleaned) return [];
  if (FOOD[cleaned]) return [FOOD[cleaned]];
  const out = [];
  for (const w of cleaned.split(/\s+/)) {
    // Match the word, or its English singular ("peppers" → "pepper").
    const e = FOOD[w] || (w.length > 3 && w.endsWith('s') ? FOOD[w.slice(0, -1)] : null);
    if (e && !out.includes(e)) out.push(e);
  }
  // A compound product like "peppers in oil" or "tuna in water" is ONE item:
  // the liquid it's stored in shouldn't be counted as a separate ingredient.
  // Drop the medium only when a real ingredient remains.
  if (out.length > 1) {
    const main = out.filter(e => !PRESERVING_MEDIUM.has(e));
    if (main.length) return main;
  }
  return out.length ? out : [cleaned];
}
// Fridge contents normalised to English ingredients, for matching against
// (English) recipe ingredient lists.
function fridgeIngredientsEN() {
  return [...new Set(state.products.flatMap(p => productToIngredients(p.name)))].filter(Boolean);
}

// Typical edible life in days for a fresh item stored normally, keyed by the
// canonical English ingredient that productToIngredients() already derives —
// so it works whatever language the product was added in.
const SHELF_LIFE = {

  chicken:2, beef:3, pork:3, fish:2, salmon:2, tuna:2, shrimp:2,

  salt:3650, chocolate:365, water:365,
  potato:30, onion:30, garlic:60, carrot:21, apple:30, lemon:21,
  tomato:7, pepper:10, cucumber:7, corn:5, beans:5, banana:5,
  mushroom:5, spinach:4,
};
// Keyword categories (across languages) used only when no ingredient matched.
// Most-specific first; first hit wins.
const SHELF_CATEGORIES = [
  { days:730, words:["canned","can ","conserv","tinned","консерв","konserve","konzerv","puszka","barattolo","缶","罐","통조림","معلب","หม้อ","kaleng"] },
  { days:180, words:["frozen","congel","заморож","tiefkühl","surgel","mrożon","mrazen","fagyas","dondurul","gefror","冷凍","냉동","مجمد","แช่แข็ง","beku","đông lạnh"] },
  { days:365, words:["dried","sušen","сушен","сухой","kuru","suszone","getrocknet","séché","seco","干","건조","مجفف","แห้ง","kering","khô"] },
  { days:3,   words:["fresh","proaspăt","свеж","frisch","frais","fresco","taze","свіж","新鲜","신선","طازج","สด","segar","tươi"] },
];
const DEFAULT_SHELF = 7;

// Best-guess days until expiry for a product name (offline, instant).
function estimateShelfDays(name) {
  let best = null;
  for (const ing of productToIngredients(name)) {
    if (SHELF_LIFE[ing] != null) best = best == null ? SHELF_LIFE[ing] : Math.min(best, SHELF_LIFE[ing]);
  }
  if (best != null) return best;
  const low = ' ' + cleanName(name) + ' ';
  for (const cat of SHELF_CATEGORIES) if (cat.words.some(w => low.includes(w))) return cat.days;
  return DEFAULT_SHELF;
}
function daysToDateInput(days) {
  // Build a LOCAL YYYY-MM-DD (toISOString would use UTC and can land a day off
  // in non-UTC timezones, which then mis-classifies freshness).
  const d = new Date(Date.now() + Math.max(0, days) * 86400000);
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${d.getFullYear()}-${mm}-${dd}`;
}

function aiProxyUrl() {

  } catch {}

  return /\.workers\.dev$/.test(location.hostname) ? location.origin + '/api' : '';
}

function postJSON(url, body, ms = 12000) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body), signal: ctrl.signal })
    .then(r => r.ok ? r.json() : null)
    .catch(() => null)
    .finally(() => clearTimeout(timer));
}
function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => { const s = String(r.result); const i = s.indexOf(','); resolve({ data: i >= 0 ? s.slice(i + 1) : s, type: file.type || 'image/jpeg' }); };
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}
// The date field stays EMPTY while adding — no visible "estimated date"
// prefill. The estimate is applied silently at save time instead: the AI
// answer if one arrived for this name, otherwise the offline table. Typing
// only queues the (debounced) AI request in the background.
let _aiDays = null;   // { name, days } — latest AI shelf-life answer for the modal
let _aiSeq = 0;
async function queueAiEstimate(name) {
  _aiDays = null;
  const url = aiProxyUrl();
  if (!url || !navigator.onLine || !name) return;
  const seq = ++_aiSeq;
  const data = await postJSON(url, { name });
  if (seq !== _aiSeq) return;                 // a newer name superseded this call
  if (data && typeof data.days === 'number' && data.days >= 0) _aiDays = { name, days: data.days };
}
