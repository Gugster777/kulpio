let currentLang = localStorage.getItem('kulpio-lang') || 'ru';
let currentTheme = localStorage.getItem('kulpio-theme') || 'dark';
let currentTab = 'home';
let listening = false;
let recognition = null;
let micResetTimer = null;
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;

// APP STATE
const state = {
  products: JSON.parse(localStorage.getItem('kulpio-products')) || [],
  lastSync: new Date().toISOString()
};

function saveState() {
  localStorage.setItem('kulpio-products', JSON.stringify(state.products));
  localStorage.setItem('kulpio-lang', currentLang);
  localStorage.setItem('kulpio-theme', currentTheme);
}

const speechLang = {en:"en-US",ru:"ru-RU",ro:"ro-RO",de:"de-DE",fr:"fr-FR",es:"es-ES",it:"it-IT",pt:"pt-BR",pl:"pl-PL",tr:"tr-TR",ar:"ar-SA",zh:"zh-CN",ja:"ja-JP",ko:"ko-KR",hi:"hi-IN",uk:"uk-UA",nl:"nl-NL",sv:"sv-SE",no:"nb-NO",da:"da-DK",fi:"fi-FI",cs:"cs-CZ",sk:"sk-SK",hu:"hu-HU",bg:"bg-BG",sr:"sr-RS",hr:"hr-HR",el:"el-GR",he:"he-IL",th:"th-TH",id:"id-ID",ms:"ms-MY",vi:"vi-VN"};

function uiText() {
  return UI[currentLang] || UI.en;
}

function esc(v) {
  return String(v).replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function render(lang) {
  const t = T[lang];
  const langSelect = document.getElementById('langSelect');
  if (langSelect) langSelect.value = lang;
  document.getElementById('tagline').textContent = t.tagline;
  document.getElementById('micHint').textContent = t.mic;

  // shortcuts
  const sc = document.getElementById('shortcuts');
  sc.innerHTML = '';
  [t.sc1, t.sc2, t.sc3].forEach((label, i) => {
    const btn = document.createElement('button');
    btn.className = 'sc';
    btn.textContent = label;
    btn.onclick = () => {
      const target = ['recipes','deals','home'][i];
      sim(['cook','deals','expiring'][i]);
      switchTab(target, document.getElementById('tab-' + target));
    };
    sc.appendChild(btn);
  });

  // nav
  ['home','recipes','deals','stores','profile'].forEach((k, i) => {
    document.getElementById('nav-' + k) && (document.getElementById('nav-' + k).textContent = t.nav[i]);
  });
  // All nav spans
  const navSpans = document.querySelectorAll('.tab span');
  navSpans.forEach((s, i) => { if(t.nav[i]) s.textContent = t.nav[i]; });

  // RTL for Arabic and Hebrew
  document.getElementById('phone').style.direction = (lang === 'ar' || lang === 'he') ? 'rtl' : 'ltr';
  renderContent();
}

function setLang(lang) {
  currentLang = lang;
  saveState();
  render(lang);
}

function setTheme(theme, btn) {
  currentTheme = theme;
  saveState();
  document.getElementById('phone').className = 'phone ' + theme;
  document.querySelectorAll('.controls .ctrl-btn:not(select)').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
}

function toggleMic() {
  if (listening) {
    stopVoiceInput();
    return;
  }
  startVoiceInput();
}

function startL() {
  listening = true;
  document.getElementById('micBtn').classList.add('active');
  document.getElementById('wave').classList.add('show');
  document.getElementById('micHint').textContent = T[currentLang].listening;
}

function stopL() {
  listening = false;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('wave').classList.remove('show');
  document.getElementById('micHint').textContent = T[currentLang].mic;
}

function setMicHint(text, reset = true) {
  clearTimeout(micResetTimer);
  document.getElementById('micHint').textContent = text;
  if (reset) {
    micResetTimer = setTimeout(() => {
      if (!listening) document.getElementById('micHint').textContent = T[currentLang].mic;
    }, 4200);
  }
}

function startVoiceInput() {
  const u = uiText();
  if (!SpeechRecognitionAPI) {
    openAssistantPanel(u.unsupported);
    return;
  }

  try {
    if (recognition) recognition.abort();
    recognition = new SpeechRecognitionAPI();
    recognition.lang = speechLang[currentLang] || 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;

    recognition.onstart = startL;
    recognition.onresult = event => {
      const transcript = event.results[0][0].transcript.trim();
      stopL();
      hideAssistantPanel();
      setMicHint(`${u.heard}: ${transcript}`, false);
      handleVoiceCommand(transcript);
    };
    recognition.onerror = event => {
      stopL();
      openAssistantPanel(`${u.unsupported} (${event.error})`);
    };
    recognition.onend = () => {
      if (listening) stopL();
    };
    recognition.start();
  } catch (err) {
    stopL();
    openAssistantPanel(u.unsupported);
  }
}

function stopVoiceInput() {
  if (recognition) recognition.stop();
  stopL();
}

function speakKulpio(text) {
  setMicHint(text);
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = speechLang[currentLang] || 'en-US';
  utterance.rate = 0.96;
  utterance.pitch = 1.08;
  window.speechSynthesis.speak(utterance);
}

function handleVoiceCommand(rawText) {
  const u = uiText();
  const text = rawText.toLowerCase();
  const pick = (tabName, reply) => {
    switchTab(tabName, document.getElementById('tab-' + tabName));
    speakKulpio(reply);
  };

  if (/(recipe|cook|meal|food|рецепт|готов|еда|блюд)/i.test(text)) return pick('recipes', u.recipesReply);
  if (/(deal|discount|offer|promo|скид|предлож|акци|промо)/i.test(text)) return pick('deals', u.dealsReply);
  if (/(store|market|shop|near|магаз|рядом|маркет)/i.test(text)) return pick('stores', u.storesReply);
  if (/(profile|saving|stats|проф|стат|эконом)/i.test(text)) return pick('profile', u.profileReply);
  if (/(home|fridge|product|холод|глав|продукт)/i.test(text)) return pick('home', u.homeReply);
  if (/(expir|soon|date|срок|истек|завтра|скоро)/i.test(text)) return pick('home', u.expiringReply);

  speakKulpio(u.unknown);
}

function openAssistantPanel(message) {
  const panel = document.getElementById('assistantPanel');
  const input = document.getElementById('assistantInput');
  panel.classList.add('show');
  setMicHint(message || uiText().unsupported, false);
  input.placeholder = currentLang === 'ru' ? 'Напиши: рецепты, скидки, магазины...' : 'Type: recipes, deals, stores...';
  setTimeout(() => input.focus(), 50);
}

function hideAssistantPanel() {
  document.getElementById('assistantPanel').classList.remove('show');
}

function submitAssistantCommand(event) {
  event.preventDefault();
  const input = document.getElementById('assistantInput');
  const value = input.value.trim();
  if (!value) return;
  input.value = '';
  hideAssistantPanel();
  handleVoiceCommand(value);
}

function quickCommand(command) {
  hideAssistantPanel();
  handleVoiceCommand(command);
}

function sim(k) {
  startL();
  setTimeout(() => {
    listening = false;
    document.getElementById('micBtn').classList.remove('active');
    document.getElementById('wave').classList.remove('show');
    document.getElementById('micHint').textContent = T[currentLang].mic;
  }, 1600);
}

function switchTab(name, el) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  renderContent();
}

function productCard(pr) {
  return `<div class="prod-item">
    <div class="pd ${pr.dot}"></div>
    <div style="flex:1"><div class="pname">${esc(pr.name)}</div><div class="pstore">${esc(pr.store)}</div></div>
    <span class="pbadge ${pr.cls}">${esc(pr.badge)}</span>
  </div>`;
}

function actionCard(icon, title, sub, meta, actionId) {
  return `<div class="action-card">
    <div class="card-icon">${icon}</div>
    <div><div class="card-title">${esc(title)}</div><div class="card-sub">${esc(sub)}</div></div>
    <button class="card-meta" onclick="handleAction('${actionId}')">${esc(meta)}</button>
  </div>`;
}

function handleAction(actionId) {
  const u = uiText();
  if (actionId === 'cook') {
    speakKulpio(u.recipesReply);
    alert(`🍳 Opening recipe: \n- Ingredients: Milk, Eggs, Flour\n- Time: 20 min\n- Method: Mix and fry!`);
  } else if (actionId === 'save') {
    speakKulpio('Saved to your list!');
    alert('✅ Deal saved successfully!');
  } else if (actionId === 'route') {
    speakKulpio('Opening map...');
    alert('🗺️ Redirecting to Google Maps...');
  } else if (actionId === 'open') {
    speakKulpio('Opening details...');
    alert('📊 Opening detailed stats...');
  } else if (actionId === 'on') {
    speakKulpio('Setting updated.');
    alert('⚙️ Setting toggled!');
  }
}

  }

  label.textContent = u.profile;
  list.innerHTML = `<div class="panel-grid">
    ${actionCard('💶', u.saved, '€18.40', u.open, 'open')}
    ${actionCard('🌱', u.waste, '3.2 kg', u.open, 'open')}
    ${actionCard('👥', u.familyPlan, u.profileSub, u.on, 'on')}
    ${actionCard('🔔', u.notifications, t.products[0].badge, u.on, 'on')}
  </div>`;
}

function openScanner() {
  document.getElementById('scanOverlay').classList.add('show');
  document.getElementById('scanStatus').textContent = currentLang === 'ru' ? 'Выберите фото чека' : 'Select receipt photo';
}

function closeScanner() {
  document.getElementById('scanOverlay').classList.remove('show');
}

async function processReceipt(input) {
  if (!input.files || !input.files[0]) return;
  
  const status = document.getElementById('scanStatus');
  status.textContent = currentLang === 'ru' ? 'Распознавание...' : 'Recognizing...';
  
  // Mock OCR Process
  await new Promise(r => setTimeout(r, 2000));
  
  const mockProducts = [
    {name: "Milk 1L", store: "Lidl", badge: "Tomorrow", cls: "br", dot: "dr"},
    {name: "Eggs x12", store: "Carrefour", badge: "5 days", cls: "ba", dot: "da"},
    {name: "Yogurt", store: "Kaufland", badge: "3 days", cls: "ba", dot: "da"}
  ];
  
  state.products = [...state.products, ...mockProducts];
  saveState();
  renderContent();
  
  status.textContent = currentLang === 'ru' ? 'Готово! Продукты добавлены' : 'Done! Products added';
  setTimeout(closeScanner, 1500);
}

function addProductManually() {
  const name = prompt("Enter product name:");
  if (!name) return;
  state.products.push({
    name: name,
    store: "Manual",
    badge: "Unknown",
    cls: "bg",
    dot: "dg"
  });
  saveState();
  renderContent();
}
// Init
document.getElementById('phone').className = 'phone ' + currentTheme;
render(currentLang);
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./service-worker.js').catch(() => {});
}
</script>
</body>
</html>
